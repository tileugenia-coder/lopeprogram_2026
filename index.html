<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marias reise mot Hytteplanmila 2026!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,900;1,300&display=swap');
:root{--bg:#fff0f3;--s:#fff5f7;--s2:#ffe8ed;--b:#f5c0cc;--t:#2a1a1e;--m:#8a5a65;--a:#c0306a;--a2:#e05585;--or:#c05020;--pu:#7030a0;--bl:#2050a0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'DM Mono',monospace;font-size:13px;line-height:1.6;min-height:100vh}
.hdr{padding:28px 24px 20px;border-bottom:1px solid var(--b)}
.hdr h1{font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--a)}
.hdr-sub{color:var(--m);font-size:11px;margin-top:2px}
.cd{color:var(--a2);font-size:11px;margin-top:4px}
nav{display:flex;border-bottom:1px solid var(--b);overflow-x:auto}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--m);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;padding:12px 16px;white-space:nowrap;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
nav button:hover{color:var(--t)}
nav button.active{color:var(--a);border-bottom-color:var(--a)}
main{padding:20px 24px;max-width:1400px}
.view{display:none}
.view.active{display:block}

.ugrid{display:grid;grid-template-columns:70px 80px 100px repeat(7,1fr);gap:0;background:var(--bg);border:1px solid #c8909a;font-size:11px}
.ucell{background:var(--s);padding:7px 9px;min-height:34px;display:flex;align-items:center;border-right:1px solid #c8909a;border-bottom:1px solid #c8909a}
.uhdr{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px;justify-content:center;text-align:center;border-right:1px solid #c8909a;border-bottom:1px solid #c8909a}
.uke-n{font-weight:500;color:var(--a);cursor:pointer;justify-content:center;flex-direction:column;align-items:center;gap:0;text-align:center}
.uke-n:hover{color:#fff}
.hvile{color:var(--m);font-style:italic}
.race-c{color:var(--or);font-weight:500}
.fl-b{border-left:3px solid #4a8a4a}.fl-O{border-left:3px solid #4a4a8a}
.fl-T{border-left:3px solid #8a8a4a}.fl-N{border-left:3px solid #8a4a4a}
.fl-D{border-left:3px solid var(--pu)}.fl-P{border-left:3px solid var(--a2)}

.wsel{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.wsel select,.lctrl select{background:var(--s);border:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:12px;padding:7px 11px;border-radius:4px;cursor:pointer}
.wnav{background:var(--s);border:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:14px;padding:5px 13px;border-radius:4px;cursor:pointer;transition:all .15s}
.wnav:hover{border-color:var(--a);color:var(--a)}
.winfo{background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:11px 15px;margin-bottom:18px;display:flex;gap:22px;flex-wrap:wrap;font-size:11px}
.ii{display:flex;flex-direction:column;gap:2px}
.il{color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.iv{color:var(--t);font-weight:500}
.iv.ac{color:var(--a)}
.wdet{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px}
.dcard{background:var(--s);border:1px solid var(--b);border-radius:6px;overflow:hidden;transition:border-color .15s}
.dcard:hover{border-color:#444}
.dcard.hvile-c{opacity:.5}
.dcard.race-d{border-color:var(--or)}
.dhdr{padding:9px 13px;background:var(--s2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b)}
.dn{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--m);font-weight:500}
.dbadge{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--b);color:var(--m)}
.dbadge.int{background:#1a3a1a;color:var(--a)}
.dbadge.tmp{background:#3a2a1a;color:var(--or)}
.dbadge.rol{background:#1a1a3a;color:var(--bl)}
.dbadge.str{background:#2a1a3a;color:var(--pu)}
.dbadge.lop{background:#3a1a0a;color:var(--or)}
.dcont{padding:11px 13px;white-space:pre-wrap;font-size:11px;line-height:1.7}

.lctrl{display:flex;gap:11px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sbtn{background:var(--a);color:#000;border:none;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:7px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.sbtn:hover{opacity:.85}
.smsg{color:var(--a2);font-size:11px}
.ltbl{width:100%;border-collapse:collapse;font-size:11px}
.ltbl th{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px 11px;text-align:left;border-bottom:1px solid var(--b);font-weight:500}
.ltbl td{padding:7px 11px;border-bottom:1px solid var(--b);vertical-align:middle}
.ltbl tr:hover td{background:var(--s2)}
.ltbl input,.ltbl select{background:transparent;border:none;border-bottom:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:11px;padding:2px 3px}
.ltbl input:focus{outline:none;border-bottom-color:var(--a)}

.scard{background:var(--s);border:1px solid var(--b);border-radius:6px;margin-bottom:16px;overflow:hidden}
.scardh{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.scardh h3{font-size:12px;font-weight:500;color:var(--pu)}
.scardh span{font-size:10px;color:var(--m)}
.stbl{width:100%;border-collapse:collapse;font-size:11px}
.stbl th{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:7px 11px;text-align:left;border-bottom:1px solid var(--b);font-weight:500}
.stbl td{padding:6px 11px;border-bottom:1px solid var(--b);vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--s2)}
.stbl input{background:transparent;border:none;border-bottom:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:11px;padding:2px 3px}
.stbl input:focus{outline:none;border-bottom-color:var(--pu)}
.fsel{display:flex;gap:3px}
.fstar{background:none;border:1px solid var(--b);color:var(--m);width:22px;height:22px;border-radius:3px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'DM Mono',monospace}
.fstar.on{background:#2a1e00;color:var(--or);border-color:var(--or)}

.igrid{display:grid;grid-template-columns:60px 70px 110px 1fr 80px 180px;gap:1px;background:var(--b);border:1px solid var(--b);font-size:11px}
.icell{background:var(--s);padding:7px 9px;min-height:33px;display:flex;align-items:center;white-space:pre-wrap}
.ihdr{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px}
.bwrap{width:100%;background:var(--b);height:5px;border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;background:var(--a)}
.bfill.dl{background:var(--pu)}.bfill.tp{background:var(--a2)}
.tpill{font-size:10px;padding:2px 7px;border-radius:99px;white-space:nowrap}
.tl{background:#1a3a1a;color:var(--a)}.t45{background:#1a2a3a;color:var(--bl)}
.t8{background:#3a2a1a;color:var(--or)}.tdl{background:#2a1a3a;color:var(--pu)}

.rlist{display:flex;flex-direction:column;gap:11px}
.rcard{background:var(--s);border:1px solid var(--b);border-left:3px solid var(--or);border-radius:6px;padding:15px 19px;display:flex;align-items:center;gap:18px}
.rcard.main{border-left-color:var(--a)}
.rdate{color:var(--m);font-size:11px;min-width:80px}
.rname{font-size:14px;font-weight:500}
.rkm{color:var(--or);font-size:11px}
.ruke{color:var(--m);font-size:10px;margin-left:auto}

.zgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:11px;margin-bottom:28px}
.zcard{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:15px}
.zcard h3{font-size:20px;font-weight:700;color:var(--a);margin-bottom:3px}
.zname{color:var(--m);font-size:11px;margin-bottom:7px}
.zbpm{font-size:15px;font-weight:500;margin-bottom:3px}
.zdesc{font-size:10px;color:var(--m);line-height:1.5}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
</style>
</head>

// Save to Firestore
async function saveToFirebase(){
  try {
    await setDoc(doc(db, "logg", USER_ID), {
      lopp: JSON.stringify(loggL),
      styrke: JSON.stringify(loggS),
      oppdatert: new Date().toISOString()
    });
    console.log("Saved to Firebase");
  } catch(e){ console.error("Firebase save error:", e); }
}

// Load from Firestore
async function loadFromFirebase(){
  try {
    const snap = await getDoc(doc(db, "logg", USER_ID));
    if(snap.exists()){
      const data = snap.data();
      if(data.lopp) loggL = JSON.parse(data.lopp);
      if(data.styrke) loggS = JSON.parse(data.styrke);
      console.log("Loaded from Firebase");
    }
  } catch(e){ console.error("Firebase load error:", e); }
}

// Listen for real-time updates from other devices
function listenFirebase(){
  onSnapshot(doc(db, "logg", USER_ID), (snap) => {
    if(snap.exists()){
      const data = snap.data();
      if(data.lopp) loggL = JSON.parse(data.lopp);
      if(data.styrke) loggS = JSON.parse(data.styrke);
      // Refresh views
      document.getElementById('ugrid').innerHTML='';
      renderUkesplan();
      renderStats();
    }
  });

      const isLogged=lKey&&loggL[lKey]&&(loggL[lKey]['var']||loggL[lKey].tid||loggL[lKey].sn);
      const isIkke=lKey&&loggL[lKey]&&loggL[lKey].ikkeUtfort;
      // Styrke A (lor) and Styrke B (tir) check
      const sKeyA=`${w.uke}_A_0_s1`;
      const sKeyB=`${w.uke}_B_0_s1`;
      const isStrLogged=(k==='lor'&&loggS[sKeyA]&&loggS[sKeyA].vekt)||(k==='tir'&&loggS[sKeyB]&&loggS[sKeyB].vekt);
      const logged=isLogged||isStrLogged;
      const d=document.createElement('div');
      d.className='ucell'+(isH?' hvile':'')+(isR?' race-c':'');
      const label=isH?'—':txt.split('\n')[0];
      d.innerHTML=isIkke
        ?`<span style="color:var(--or)">✗</span> <span style="opacity:.5">${label}</span>`
        :logged
        ?`<span style="color:var(--a2)">✓</span> <span style="text-decoration:line-through;opacity:.6">${label}</span>`
        :label;
      g.appendChild(d);
    });
  });
}

function initWsel(){
  const sel=document.getElementById('wsel');
  W.forEach(w=>{const o=document.createElement('option');o.value=w.uke;o.textContent=`Uke ${w.uke} (${w.kaluke}) – ${w.dato}`;sel.appendChild(o);});
}

function cw(d){curW=Math.max(1,Math.min(24,curW+d));document.getElementById('wsel').value=curW;rdw();}

function rdw(){curW=parseInt(document.getElementById('wsel').value)||curW;renderWeek(curW);}

function renderWeek(n){
  const w=W.find(x=>x.uke===n);if(!w)return;
  document.getElementById('wsel').value=n;
  const race=RC.find(r=>r.uke===n);
  document.getElementById('winfo').innerHTML=`
    <div class="ii"><div class="il">Uke</div><div class="iv ac">Uke ${n} (${w.kaluke})</div></div>
    <div class="ii"><div class="il">Dato</div><div class="iv">${w.dato}</div></div>
    <div class="ii"><div class="il">Fase</div><div class="iv">${w.fase}</div></div>
    ${race?`<div class="ii"><div class="il">Løp</div><div class="iv" style="color:var(--or)">🏁 ${race.navn} ${race.km} km</div></div>`:''}
  `;
  const days=[{k:'man',l:'Mandag'},{k:'tir',l:'Tirsdag'},{k:'ons',l:'Onsdag'},{k:'tor',l:'Torsdag'},{k:'fre',l:'Fredag'},{k:'lor',l:'Lørdag'},{k:'son',l:'Søndag'}];
  const det=document.getElementById('wdet');det.innerHTML='';
  days.forEach(d=>{
    const txt=w[d.k]||'';const isH=txt==='Hvile';const isR=txt.includes('🏁');
    let badge='',bcls='';
    if(isH){badge='Hvile';}else if(isR){badge='Løp';bcls='lop';}
    else if(txt.startsWith('Intervall')){badge='Intervall + Styrke B';bcls='int';}
    else if(txt.startsWith('Tempoøkt')){badge='Tempo';bcls='tmp';}
    else if(txt.startsWith('Rolig løpetur + SL')){badge='Rolig løp + ST';bcls='rol';}
    else if(txt.startsWith('Rolig langtur')){badge='Langtur';bcls='rol';}
    else if(txt.startsWith('Styrke A')){badge='Styrke A';bcls='str';}
    else{badge=txt.split('\n')[0];}
    const card=document.createElement('div');
    card.className='dcard'+(isH?' hvile-c':'')+(isR?' race-d':'');
    const lines=txt.split('\n');
    const fmt=isH?'<span style="color:var(--m);font-style:italic">Hvile / aktiv restitusjon</span>':
      lines.map((l,i)=>{
        if(i===0)return`<strong style="color:var(--a)">${l}</strong>`;
        if(l.trim()==='')return'';
        if(l==='Styrke B'||l.startsWith('Styrke A'))return`<strong style="color:var(--pu);display:block;margin-top:8px">${l}</strong>`;
        return l;
      }).join('\n');
    card.innerHTML=`<div class="dhdr"><span class="dn">${d.l}</span><span class="dbadge ${bcls}">${badge}</span></div><div class="dcont">${fmt}</div>`;
    det.appendChild(card);
  });
}

function upL(k,f,v){if(!loggL[k])loggL[k]={};loggL[k][f]=v;}

function upS(k,f,v){if(!loggS[k])loggS[k]={};loggS[k][f]=v;}

function setF(key,n,btn){
  if(!loggS[key])loggS[key]={};loggS[key].fol=n;
  btn.closest('tr').querySelectorAll('.fstar').forEach((b,i)=>b.classList.toggle('on',i<n));
}

function savel(t){
  try{
    if(t==='l'){localStorage.setItem('hpm_l',JSON.stringify(loggL));sm('lmsg');}
    else{localStorage.setItem('hpm_s',JSON.stringify(loggS));sm('smsg');}
  }catch(e){console.warn('Storage unavailable');}
}

function sm(id){const el=document.getElementById(id);el.textContent='✓ Lagret';setTimeout(()=>el.textContent='',2000);}

function renderIntervall(){
  const g=document.getElementById('igrid');
  const mx=Math.max(...IV.map(i=>i.arbeidstid));
  ['Uke','Dato','Type','Drag','Arbeid','Progresjon'].forEach(h=>{const d=document.createElement('div');d.className='icell ihdr';d.textContent=h;g.appendChild(d);});
  IV.forEach(iv=>{
    const w=W.find(x=>x.uke===iv.uke);
    const pct=Math.round(iv.arbeidstid/mx*100);
    const isD=iv.type.includes('Deload'),isT=w&&w.fase.includes('Taper');
    const tc=iv.type.includes('45/15')?'t45':iv.type.includes('8 min')?'t8':isD?'tdl':'tl';
    const bc=isD?'dl':isT?'tp':'';
    [[`Uke ${iv.uke}`],[w?w.dato:''],[`<span class="tpill ${tc}">${iv.type}</span>`],[iv.drag],[`${iv.arbeidstid} min`]].forEach(([v])=>{
      const d=document.createElement('div');d.className='icell';d.innerHTML=v;g.appendChild(d);
    });
    const bd=document.createElement('div');bd.className='icell';
    bd.innerHTML=`<div style="width:100%"><div class="bwrap"><div class="bfill ${bc}" style="width:${pct}%"></div></div></div>`;

function renderStats(){
  const sb=document.getElementById('stats-body');
  if(!sb){console.error('stats-body not found');return;}
  sb.innerHTML='';

  const loktKeys=['intervall','roligLop','tempo','langtur','race'];
  let totalKm=0, totalUtfort=0, totalIkke=0, pulsList=[], folList=[];

  W.forEach(w=>{
    loktKeys.forEach(k=>{
      const sv=loggL[w.uke+'_'+k]||{};
      if(sv['var']||sv.tid||sv.sn||sv.km) totalUtfort++;
      if(sv.ikkeUtfort) totalIkke++;
      if(sv.km) totalKm+=parseFloat(sv.km)||0;
      if(sv.sn) pulsList.push(parseFloat(sv.sn));
      if(sv.fol) folList.push(parseFloat(sv.fol));
    });
    // Count strength sessions
    ['A','B'].forEach(okt=>{
      const src=okt==='A'?SA:SB;
      const ovs=src[String(w.uke)]||[];
      if(!ovs.length) return;
      const sk=w.uke+'_'+okt+'_0_s1';
      const sv=loggS[sk]||{};
      if(sv.vekt||sv.reps) totalUtfort++;
      const skIkke=w.uke+'_'+okt+'_0';
      if(loggS[skIkke]&&loggS[skIkke].ikkeUtfort) totalIkke++;
    });
  });
  totalKm=Math.round(totalKm*10)/10;
  const snittPuls=pulsList.length?Math.round(pulsList.reduce((a,b)=>a+b,0)/pulsList.length):null;
  const snittFol=folList.length?Math.round(folList.reduce((a,b)=>a+b,0)/folList.length*10)/10:null;

  // Summary cards
  const cards=[
    {l:'Totalt løpt',v:totalKm+' km',c:'var(--a)'},
    {l:'Gjennomført',v:totalUtfort+' økter',c:'var(--a2)'},
    {l:'Ikke utført',v:totalIkke+' økter',c:totalIkke>0?'var(--or)':'var(--m)'},
    {l:'Snitt puls',v:snittPuls?snittPuls+' bpm':'–',c:'var(--or)'},
    {l:'Snitt følelse',v:snittFol?snittFol+' / 5':'–',c:'var(--pu)'},
  ];
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px';
  cards.forEach(c=>{
    const d=document.createElement('div');
    d.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px';
    d.innerHTML='<div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">'+c.l+'</div><div style="font-size:22px;font-weight:500;color:'+c.c+'">'+c.v+'</div>';
    grid.appendChild(d);
  });
  sb.appendChild(grid);

  // Km per uke
  const t1=document.createElement('h2');
  t1.style.cssText='font-size:16px;font-weight:500;color:var(--a);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';
  t1.textContent='Km per uke';
  sb.appendChild(t1);

  const kmData=W.map(w=>{
    let km=0, ikke=0;
    loktKeys.forEach(k=>{
      const sv=loggL[w.uke+'_'+k]||{};
      if(sv.km) km+=parseFloat(sv.km)||0;
      if(sv.ikkeUtfort) ikke++;
    });
    return{uke:w.uke,kaluke:w.kaluke,km:Math.round(km*10)/10,ikke};
  });
  const maxKm=Math.max(...kmData.map(d=>d.km),1);

  const barWrap=document.createElement('div');
  barWrap.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:16px;margin-bottom:28px;overflow-x:auto';
  const barInner=document.createElement('div');
  barInner.style.cssText='display:flex;align-items:flex-end;gap:3px;height:160px;min-width:500px';

  kmData.forEach(d=>{
    const pct=d.km/maxKm*100;
    const col=d.ikke>0&&d.km===0?'var(--or)':[1,7,8,18,19,24].includes(d.uke)?'var(--or)':[4,8,12,16].includes(d.uke)?'var(--pu)':d.km>0?'var(--a)':'var(--b)';
    const bar=document.createElement('div');
    bar.style.cssText='display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:18px';
    bar.innerHTML='<div style="font-size:9px;color:var(--m);height:14px;line-height:14px;text-align:center">'+(d.km>0?d.km:d.ikke>0?'✗':'')+'</div>'
      +'<div style="width:100%;background:'+col+';border-radius:2px 2px 0 0;height:'+Math.max(pct,d.km>0||d.ikke>0?2:0)+'%;min-height:'+(d.km>0||d.ikke>0?'3px':'0')+'"></div>'
      +'<div style="font-size:8px;color:var(--m);writing-mode:vertical-rl;transform:rotate(180deg);height:24px;overflow:hidden;text-align:center">'+d.kaluke+'</div>';
    barInner.appendChild(bar);
  });
  barWrap.appendChild(barInner);
  sb.appendChild(barWrap);

  // Puls over tid
  const t2=document.createElement('h2');
  t2.style.cssText='font-size:16px;font-weight:500;color:var(--or);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';
  t2.textContent='Snitt puls over tid';
  sb.appendChild(t2);

  const pulsData=[];
  W.forEach(w=>{
    let list=[];
    loktKeys.forEach(k=>{const sv=loggL[w.uke+'_'+k]||{};if(sv.sn)list.push(parseFloat(sv.sn));});
    if(list.length) pulsData.push({kaluke:w.kaluke,puls:Math.round(list.reduce((a,b)=>a+b,0)/list.length)});
  });

  const pulsWrap=document.createElement('div');
  pulsWrap.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:16px;margin-bottom:28px';
  if(!pulsData.length){
    pulsWrap.innerHTML='<p style="color:var(--m);font-style:italic;font-size:12px">Ingen pulsdata ennå.</p>';
  } else {
    const W2=500,H2=100;
    const minP=Math.min(...pulsData.map(d=>d.puls))-10;
    const maxP=Math.max(...pulsData.map(d=>d.puls))+10;
    const pts=pulsData.map((d,i)=>{
      const x=20+i*(W2-40)/(pulsData.length-1||1);
      const y=H2-15-(d.puls-minP)/(maxP-minP)*(H2-30);
      return{x,y,d};
    });
    const path=pts.map((p,i)=>(i?'L':'M')+p.x+','+p.y).join(' ');
    const dots=pts.map(p=>'<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="var(--or)"/><text x="'+p.x+'" y="'+(p.y-6)+'" font-size="9" fill="var(--or)" text-anchor="middle">'+p.d.puls+'</text>').join('');
    const g164y=H2-15-(164-minP)/(maxP-minP)*(H2-30);
    const g171y=H2-15-(171-minP)/(maxP-minP)*(H2-30);
    pulsWrap.innerHTML='<div style="overflow-x:auto"><svg viewBox="0 0 '+W2+' '+H2+'" width="100%" style="min-width:300px;display:block">'
      +(g164y>5&&g164y<H2?'<line x1="0" y1="'+g164y+'" x2="'+W2+'" y2="'+g164y+'" stroke="var(--a)" stroke-width="0.5" stroke-dasharray="3,3"/><text x="2" y="'+(g164y-2)+'" font-size="8" fill="var(--a)">164</text>':'')
      +(g171y>5&&g171y<H2?'<line x1="0" y1="'+g171y+'" x2="'+W2+'" y2="'+g171y+'" stroke="var(--a)" stroke-width="0.5" stroke-dasharray="3,3"/><text x="2" y="'+(g171y-2)+'" font-size="8" fill="var(--a)">171</text>':'')
      +'<path d="'+path+'" fill="none" stroke="var(--or)" stroke-width="2"/>'
      +dots+'</svg></div>';
  }
  sb.appendChild(pulsWrap);

  // Følelse over tid
  const t3=document.createElement('h2');
  t3.style.cssText='font-size:16px;font-weight:500;color:var(--pu);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';
  t3.textContent='Snitt følelse over tid (1–5)';
  sb.appendChild(t3);

  const folData2=[];
  W.forEach(w=>{
    let list=[];
    loktKeys.forEach(k=>{const sv=loggL[w.uke+'_'+k]||{};if(sv.fol)list.push(parseFloat(sv.fol));});
    if(list.length) folData2.push({kaluke:w.kaluke,fol:Math.round(list.reduce((a,b)=>a+b,0)/list.length*10)/10});
  });

  const folWrap=document.createElement('div');
  folWrap.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:16px;margin-bottom:28px';
  if(!folData2.length){
    folWrap.innerHTML='<p style="color:var(--m);font-style:italic;font-size:12px">Ingen følelsesdata ennå.</p>';
  } else {
    const W3=500,H3=100;
    const pts=folData2.map((d,i)=>{
      const x=20+i*(W3-40)/(folData2.length-1||1);
      const y=H3-15-(d.fol-1)/4*(H3-30);
      return{x,y,d};
    });
    const path=pts.map((p,i)=>(i?'L':'M')+p.x+','+p.y).join(' ');
    const dots=pts.map(p=>'<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="var(--pu)"/><text x="'+p.x+'" y="'+(p.y-6)+'" font-size="9" fill="var(--pu)" text-anchor="middle">'+p.d.fol+'</text>').join('');
    folWrap.innerHTML='<div style="overflow-x:auto"><svg viewBox="0 0 '+W3+' '+H3+'" width="100%" style="min-width:300px;display:block">'
      +'<path d="'+path+'" fill="none" stroke="var(--pu)" stroke-width="2"/>'
      +dots+'</svg></div>';
  }
  sb.appendChild(folWrap);

  // ── Styrke progresjon ────────────────────────────────────────────────
  const strPTitle=document.createElement('h2');
  strPTitle.style.cssText='font-size:16px;font-weight:500;color:var(--a2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';
  strPTitle.textContent='Progresjon styrkeøvelser';
  sb.appendChild(strPTitle);

  ['A','B'].forEach(okt=>{
    const src=okt==='A'?SA:SB;
    // Collect all unique exercise names
    const exNames=[];
    Object.values(src).forEach(ovs=>ovs.forEach(ov=>{
      const n=ov.split(' – ')[0];
      if(!exNames.includes(n)) exNames.push(n);
    }));

    // Build data per exercise
    const exWithData=[];
    exNames.forEach(name=>{
      const pts=[];
      Object.entries(src).forEach(([ukeStr,ovs])=>{
        const uke=parseInt(ukeStr);
        const idx=ovs.findIndex(o=>o.split(' – ')[0]===name);
        if(idx===-1) return;
        const plan=ovs[idx].split(' – ').slice(1).join(' – ');
        const setsM=plan.match(/(\d+)×/);
        const numSets=setsM?parseInt(setsM[1]):3;
        let maxVekt=null, lastReps=null;
        for(let s=1;s<=numSets;s++){
          const sk=uke+'_'+okt+'_'+idx+'_s'+s;
          const sv=loggS[sk]||{};
          if(sv.vekt){ const v=parseFloat(sv.vekt); if(maxVekt===null||v>maxVekt) maxVekt=v; }
          if(sv.reps && lastReps===null) lastReps=sv.reps;
        }
        if(maxVekt!==null||lastReps) pts.push({uke,vekt:maxVekt,reps:lastReps});
      });
      if(pts.length) exWithData.push({name,pts,okt});
    });

    if(!exWithData.length) return;

    const oktTitle=document.createElement('h3');
    oktTitle.style.cssText='font-size:13px;font-weight:500;color:var(--pu);margin:18px 0 10px';
    oktTitle.textContent='Styrke '+okt+(okt==='A'?' – Lørdag':' – Tirsdag');
    sb.appendChild(oktTitle);

    const exGrid=document.createElement('div');
    exGrid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:8px';

    exWithData.forEach(({name,pts})=>{
      const first=pts[0],last=pts[pts.length-1];
      const vektDiff=first.vekt&&last.vekt?Math.round((last.vekt-first.vekt)*10)/10:null;
      const diffCol=vektDiff>0?'var(--a)':vektDiff<0?'var(--or)':'var(--m)';
      const diffStr=vektDiff!==null?(vektDiff>0?'+'+vektDiff+' kg':vektDiff+' kg'):'';

      // Mini SVG line chart for vekt
      let chartSvg='';
      const vPts=pts.filter(p=>p.vekt);
      if(vPts.length>1){
        const W=200,H=50;
        const minV=Math.min(...vPts.map(p=>p.vekt));
        const maxV=Math.max(...vPts.map(p=>p.vekt));
        const rng=maxV-minV||1;
        const coords=vPts.map((p,i)=>{
          const x=8+i*(W-16)/(vPts.length-1);
          const y=H-8-(p.vekt-minV)/rng*(H-16);
          return{x,y,v:p.vekt};
        });
        const path=coords.map((c,i)=>(i?'L':'M')+c.x+','+c.y).join(' ');
        const dots=coords.map(c=>'<circle cx="'+c.x+'" cy="'+c.y+'" r="2.5" fill="var(--a2)"/>').join('');
        const firstLbl='<text x="'+coords[0].x+'" y="'+(coords[0].y+(coords[0].y<20?12:-4))+'" font-size="8" fill="var(--m)" text-anchor="middle">'+coords[0].v+'</text>';
        const lastLbl='<text x="'+coords[coords.length-1].x+'" y="'+(coords[coords.length-1].y+(coords[coords.length-1].y<20?12:-4))+'" font-size="8" fill="var(--a2)" text-anchor="middle">'+coords[coords.length-1].v+'</text>';
        chartSvg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="50" style="display:block;margin-top:6px">'
          +'<path d="'+path+'" fill="none" stroke="var(--a2)" stroke-width="1.5" stroke-linejoin="round"/>'
          +dots+firstLbl+lastLbl+'</svg>';
      }

      const card=document.createElement('div');
      card.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:hidden';
      card.innerHTML=
        '<div style="padding:9px 12px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center">'
        +'<strong style="font-size:11px">'+name+'</strong>'
        +'<span style="font-size:11px;color:'+diffCol+'">'+diffStr+'</span>'
        +'</div>'
        +(chartSvg?'<div style="padding:4px 12px 0">'+chartSvg+'</div>':'')
        +'<div style="padding:8px 12px 10px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:10px">'
        +(last.vekt?'<div><span style="color:var(--m)">Siste vekt: </span><strong style="color:var(--a2)">'+last.vekt+' kg</strong></div>':'')
        +(last.reps?'<div><span style="color:var(--m)">Siste reps: </span><strong style="color:var(--a2)">'+last.reps+'</strong></div>':'')
        +'<div><span style="color:var(--m)">Logginger: </span><strong>'+pts.length+'</strong></div>'
        +'</div>';
      exGrid.appendChild(card);
    });
    sb.appendChild(exGrid);
  });

  // ── Løpsresultater ───────────────────────────────────────────────────
  const racesList=[
    {uke:1,navn:"Backyard Ultra",km:18,dato:"09.05.2026"},
    {uke:7,navn:"Sommernattsløpet",km:5,dato:"20.06.2026"},
    {uke:8,navn:"EcoTrail Bergen",km:12,dato:"27.06.2026"},
    {uke:18,navn:"Jentemila",km:5,dato:"05.09.2026"},
    {uke:19,navn:"Oslo Maraton",km:10,dato:"12.09.2026"},
    {uke:24,navn:"Hytteplanmila",km:10,dato:"17.10.2026"},
  ];

  const raceTitle=document.createElement('h2');
  raceTitle.style.cssText='font-size:16px;font-weight:500;color:var(--or);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';

function initReg(){
  const sel=document.getElementById('reg-uke');
  W.forEach(w=>{const o=document.createElement('option');o.value=w.uke;o.textContent=`Uke ${w.uke} (${w.kaluke}) – ${w.dato} – ${w.fase}`;sel.appendChild(o);});

  // Auto-detect current week based on today's date
  const today=new Date();
  const start=new Date('2026-05-04');
  const diffDays=Math.floor((today-start)/(1000*60*60*24));
  const curUke=Math.min(24,Math.max(1,Math.floor(diffDays/7)+1));
  sel.value=curUke;
  renderReg();
}

function ikkeUtfort(key, msgId){
  if(!loggL[key]) loggL[key]={};
  loggL[key].ikkeUtfort=true;
  loggL[key]['var']='';loggL[key].sn='';loggL[key].km='';
  try{
    localStorage.setItem('hpm_l',JSON.stringify(loggL));
    const el=document.getElementById(msgId);
    if(el){el.textContent='✗ Ikke utført';el.style.color='var(--or)';setTimeout(()=>{el.textContent='';el.style.color='';},2000);}
    document.getElementById('ugrid').innerHTML='';renderUkesplan();renderStats();
  }catch(e){}
}

function ikkeUtfortStr(uke, okt, msgId){
  // Mark all sets as not done
  const src=okt==='A'?SA:SB;
  const ovs=src[String(uke)]||[];
  ovs.forEach((ov,i)=>{
    for(let s=1;s<=4;s++){
      const sk=`${uke}_${okt}_${i}_s${s}`;
      if(!loggS[sk]) loggS[sk]={};
      loggS[sk].ikkeUtfort=true;
    }
  });
  try{
    localStorage.setItem('hpm_s',JSON.stringify(loggS));
    const el=document.getElementById(msgId);
    if(el){el.textContent='✗ Ikke utført';el.style.color='var(--or)';setTimeout(()=>{el.textContent='';el.style.color='';},2000);}
    document.getElementById('ugrid').innerHTML='';renderUkesplan();renderStats();
  }catch(e){}
}

function saveOkt(key, msgId){
  try{
    localStorage.setItem('hpm_l',JSON.stringify(loggL));
    localStorage.setItem('hpm_s',JSON.stringify(loggS));
    saveToFirebase();
    const el=document.getElementById(msgId);
    if(el){el.textContent='✓ Lagret';setTimeout(()=>el.textContent='',2000);}
    // Refresh views and checkmarks
    
    document.getElementById('ugrid').innerHTML='';
    renderUkesplan();
    renderStats();
  }catch(e){console.warn('Storage unavailable');}
}
