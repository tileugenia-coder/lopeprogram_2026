<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treningsdagbok</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,900;1,300&display=swap');
:root{--bg:#fff0f3;--s:#fff5f7;--s2:#ffe8ed;--b:#f5c0cc;--t:#2a1a1e;--m:#8a5a65;--a:#c0306a;--a2:#e05585;--or:#c05020;--pu:#7030a0;--bl:#2050a0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'DM Mono',monospace;font-size:13px;line-height:1.6;min-height:100vh}
.hdr{padding:28px 24px 20px;border-bottom:1px solid var(--b)}
.hdr h1{font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--a)}
.hdr-sub{color:var(--m);font-size:11px;margin-top:2px}
.cd{color:var(--a2);font-size:11px;margin-top:4px}
nav{display:flex;border-bottom:1px solid var(--b);overflow-x:auto}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--m);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;padding:12px 16px;white-space:nowrap;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
nav button:hover{color:var(--t)}
nav button.active{color:var(--a);border-bottom-color:var(--a)}
main{padding:20px 24px;max-width:1400px}
.view{display:none}
.view.active{display:block}

.ugrid{display:grid;grid-template-columns:70px 80px 100px repeat(7,1fr);gap:0;background:var(--bg);border:1px solid #c8909a;font-size:11px}
.ucell{background:var(--s);padding:6px 8px;min-height:40px;display:flex;align-items:center;border-right:1px solid #c8909a;border-bottom:1px solid #c8909a;font-weight:500}
.uhdr{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px;justify-content:center;text-align:center;border-right:1px solid #c8909a;border-bottom:1px solid #c8909a}
.uke-n{font-weight:500;color:var(--a);cursor:pointer;justify-content:center;flex-direction:column;align-items:center;gap:0;text-align:center}
.uke-n:hover{color:#fff}
.hvile{color:var(--m);font-style:italic}
.race-c{color:var(--or);font-weight:500}
.fl-b{border-left:3px solid #4a8a4a}.fl-O{border-left:3px solid #4a4a8a}
.fl-T{border-left:3px solid #8a8a4a}.fl-N{border-left:3px solid #8a4a4a}
.fl-D{border-left:3px solid var(--pu)}.fl-P{border-left:3px solid var(--a2)}

.wsel{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.wsel select,.lctrl select{background:var(--s);border:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:12px;padding:7px 11px;border-radius:4px;cursor:pointer}
.wnav{background:var(--s);border:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:14px;padding:5px 13px;border-radius:4px;cursor:pointer;transition:all .15s}
.wnav:hover{border-color:var(--a);color:var(--a)}
.winfo{background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:11px 15px;margin-bottom:18px;display:flex;gap:22px;flex-wrap:wrap;font-size:11px}
.ii{display:flex;flex-direction:column;gap:2px}
.il{color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.iv{color:var(--t);font-weight:500}
.iv.ac{color:var(--a)}
.wdet{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px}
.dcard{background:var(--s);border:1px solid var(--b);border-radius:6px;overflow:hidden;transition:border-color .15s}
.dcard:hover{border-color:#444}
.dcard.hvile-c{opacity:.5}
.dcard.race-d{border-color:var(--or)}
.dhdr{padding:9px 13px;background:var(--s2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b)}
.dn{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--m);font-weight:500}
.dbadge{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--b);color:var(--m)}
.dbadge.int{background:#1a3a1a;color:var(--a)}
.dbadge.tmp{background:#3a2a1a;color:var(--or)}
.dbadge.rol{background:#1a1a3a;color:var(--bl)}
.dbadge.str{background:#2a1a3a;color:var(--pu)}
.dbadge.lop{background:#3a1a0a;color:var(--or)}
.dcont{padding:11px 13px;white-space:pre-wrap;font-size:11px;line-height:1.7}

.lctrl{display:flex;gap:11px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sbtn{background:var(--a);color:#000;border:none;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:7px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.sbtn:hover{opacity:.85}
.smsg{color:var(--a2);font-size:11px}
.ltbl{width:100%;border-collapse:collapse;font-size:11px}
.ltbl th{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px 11px;text-align:left;border-bottom:1px solid var(--b);font-weight:500}
.ltbl td{padding:7px 11px;border-bottom:1px solid var(--b);vertical-align:middle}
.ltbl tr:hover td{background:var(--s2)}
.ltbl input,.ltbl select{background:transparent;border:none;border-bottom:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:11px;padding:2px 3px}
.ltbl input:focus{outline:none;border-bottom-color:var(--a)}

.scard{background:var(--s);border:1px solid var(--b);border-radius:6px;margin-bottom:16px;overflow:hidden}
.scardh{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.scardh h3{font-size:12px;font-weight:500;color:var(--pu)}
.scardh span{font-size:10px;color:var(--m)}
.stbl{width:100%;border-collapse:collapse;font-size:11px}
.stbl th{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:7px 11px;text-align:left;border-bottom:1px solid var(--b);font-weight:500}
.stbl td{padding:6px 11px;border-bottom:1px solid var(--b);vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--s2)}
.stbl input{background:transparent;border:none;border-bottom:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:11px;padding:2px 3px}
.stbl input:focus{outline:none;border-bottom-color:var(--pu)}
.fsel{display:flex;gap:3px}
.fstar{background:none;border:1px solid var(--b);color:var(--m);width:22px;height:22px;border-radius:3px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'DM Mono',monospace}
.fstar.on{background:#2a1e00;color:var(--or);border-color:var(--or)}


.rlist{display:flex;flex-direction:column;gap:11px}
.rcard{background:var(--s);border:1px solid var(--b);border-left:3px solid var(--or);border-radius:6px;padding:15px 19px;display:flex;align-items:center;gap:18px}
.rcard.main{border-left-color:var(--a)}
.rdate{color:var(--m);font-size:11px;min-width:80px}
.rname{font-size:14px;font-weight:500}
.rkm{color:var(--or);font-size:11px}
.ruke{color:var(--m);font-size:10px;margin-left:auto}

.zgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:11px;margin-bottom:28px}
.zcard{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:15px}
.zcard h3{font-size:20px;font-weight:700;color:var(--a);margin-bottom:3px}
.zname{color:var(--m);font-size:11px;margin-bottom:7px}
.zbpm{font-size:15px;font-weight:500;margin-bottom:3px}
.zdesc{font-size:10px;color:var(--m);line-height:1.5}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}



.hpm-collapsed .hpm-body{display:none}
.hpm-preview{display:none;padding:10px 14px;align-items:center;justify-content:space-between;cursor:pointer;font-size:11px;gap:8px}
.hpm-preview:hover{background:var(--s2)}
.hpm-collapsed .hpm-preview{display:flex}
.hpm-done{border-left:3px solid var(--a2)!important}
.hpm-ikke{border-left:3px solid var(--or)!important}

/* Auth styles */
body.guest .sbtn { display: none !important; }
body.guest button[onclick*="ikkeUtfort"] { display: none !important; }
body.guest button[onclick*="nullstill"] { display: none !important; }
body.guest button[onclick*="Angre"] { display: none !important; }
body.guest button[onclick*="angre"] { display: none !important; }
body.guest .smsg { display: none !important; }
body.guest #export-btn { display: none !important; }
.guest-only-msg { display: none; }
body.guest .guest-only-msg { display: inline; }
body.guest .scard button:not(.sbtn) { display: none !important; }
body.guest #auth-banner { background: var(--s2); padding: 6px 12px; border-radius: 4px; }
</style>

function nullstillUke(){
  const uv=document.getElementById('reg-uke').value;
  if(!uv) return;
  const uke=parseInt(uv);
  if(!confirm('Nullstille all logging for uke '+uke+'?')) return;
  // Delete all running sessions
  ['intervall','roligLop','langtur','valgfri1','valgfri2','valgfri3','race'].forEach(k=>{
    delete loggL[uke+'_'+k];
  });
  // Delete all strength sessions
  ['A','B','C'].forEach(okt=>{
    const src=strSrc(okt);
    const ovs=src[String(uke)]||[];
    ovs.forEach((ov,i)=>{
      const sn=ov.split(' – ')[0].replace(/[^a-zA-Z0-9]/g,'-');
      for(let s=1;s<=4;s++){
        delete loggS[uke+'_'+okt+'_'+sn+'_s'+s];
      }
    });
  });
  localStorage.setItem('hpm_l', JSON.stringify(loggL));
  localStorage.setItem('hpm_s', JSON.stringify(loggS));
  fbSave();
  document.getElementById('ugrid').innerHTML='';
  renderUkesplan();
  renderStats();
  renderReg();
}

const STR_LABEL={A:'underkropp + core',B:'underkropp + core',C:'overkropp'};
function strSrc(o){return o==='A'?SA:o==='B'?SB:SC;}
function strOkter(uke){
  if(uke>=10) return ['A','B','C'];
  const r=[];
  if((SA[String(uke)]||[]).length) r.push('A');
  if((SB[String(uke)]||[]).length) r.push('B');
  if((SC[String(uke)]||[]).length) r.push('C');
  return r;
}
function runOkter(uke){
  // Løpeprogrammeringen brukes ikke lenger – 3 faste + 3 valgfrie løpeøkter hver uke.
  return [
    {k:'intervall', l:'Intervall', txt:''},
    {k:'roligLop', l:'Rolig løpetur + SL', txt:''},
    {k:'langtur', l:'Rolig langtur', txt:''},
    {k:'valgfri1', l:'Valgfri økt 1', txt:''},
    {k:'valgfri2', l:'Valgfri økt 2', txt:''},
    {k:'valgfri3', l:'Valgfri økt 3', txt:''}
  ];
}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function upLDato(k,v){if(!loggL[k])loggL[k]={};loggL[k].dato=v;}
function upSDato(k,v){if(!loggS[k])loggS[k]={};loggS[k].dato=v;}
function datoInput(store,key,fn){
  const cur=(store[key]&&store[key].dato)||todayISO();
  return '<div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Dato utført</div>'
    +'<input type="date" value="'+cur+'" onchange="'+fn+'(\''+key+'\',this.value)" '

}

function nav(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('v-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='ukedetalj') rdw();
  if(id==='ukesplan'){document.getElementById('ugrid').innerHTML='';renderUkesplan();}
  if(id==='styrke') renderStyrke();
  if(id==='stats') renderStats();
  if(id==='prognose') renderPrognose();
}

function gw(n){curW=n;document.querySelector('#wsel').value=n;rdw();document.querySelectorAll('nav button')[1].click();}

function renderUkesplan(){
  const g=document.getElementById('ugrid');
  g.className='';                 // ikke lenger dag-rutenett
  g.style.display='flex';
  g.style.flexDirection='column';
  g.style.gap='10px';
  g.innerHTML='';

  const runLabel={intervall:'Intervall',roligLop:'Rolig løp + ST',langtur:'Langtur'};

  function runStatus(uke,k){
    const sv=loggL[uke+'_'+k]||{};
    if(sv.ikkeUtfort) return 'ikke';
    if(sv['var']||sv.tid||sv.sn||sv.km||sv.tempo||sv.fol||sv.watt) return 'done';
    return 'open';
  }
  function raceStatus(uke){
    const sv=loggL[uke+'_race']||{};
    if(sv.ikkeUtfort) return 'ikke';
    if(sv.tid||sv.km||sv.sn) return 'done';
    return 'open';
  }
  function strStatus(uke,okt){
    const first=(strSrc(okt)[String(uke)]||[])[0]||'';
    const sn=first.split(' – ')[0].replace(/[^a-zA-Z0-9]/g,'-');
    const s1=loggS[uke+'_'+okt+'_'+sn+'_s1']||{};
    if(s1.ikkeUtfort) return 'ikke';
    if(s1.vekt||s1.reps) return 'done';
    return 'open';
  }
  function chip(label, status, color){
    const icon=status==='done'?'✓':status==='ikke'?'✗':'○';
    const ic=status==='done'?'var(--a2)':status==='ikke'?'var(--or)':'var(--m)';
    const deco=status==='done'?'line-through':'none';
    const op=status==='done'?'.6':'1';
    return '<span style="display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b);border-left:3px solid '+color+';border-radius:5px;padding:4px 9px;font-size:11px;white-space:nowrap">'
      +'<span style="color:'+ic+';font-weight:700">'+icon+'</span>'
      +'<span style="color:var(--t);text-decoration:'+deco+';opacity:'+op+'">'+label+'</span></span>';
  }

  W.forEach(w=>{
    const race=RC.find(r=>r.uke===w.uke);
    const card=document.createElement('div');
    card.style.cssText='border:1px solid var(--b);border-radius:8px;padding:12px 14px;background:var(--s)';

    const head=document.createElement('div');
    head.style.cssText='display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px';
    head.innerHTML='<span class="uke-n" style="cursor:pointer;font-weight:700;color:var(--a);font-size:13px" onclick="gw('+w.uke+')">Uke '+w.uke+' · '+w.kaluke+'</span>'
      +'<span style="font-size:11px;color:var(--m)">'+w.dato+'</span>';
    card.appendChild(head);

    const chips=document.createElement('div');
    chips.style.cssText='display:flex;flex-wrap:wrap;gap:8px';
    let html2='';
    const alleOkter=runOkter(w.uke);
    const fasteLop=alleOkter.filter(o=>o.k!=='valgfri1'&&o.k!=='valgfri2'&&o.k!=='valgfri3');
    const valgfrie=alleOkter.filter(o=>o.k==='valgfri1'||o.k==='valgfri2'||o.k==='valgfri3');
    function runChip(o){
      const custom=(loggL[w.uke+'_'+o.k]||{}).type;
      html2+=chip(custom||runLabel[o.k]||o.l, runStatus(w.uke,o.k), 'var(--a)');
    }
    fasteLop.forEach(runChip);
    if(race) html2+=chip('🏁 '+race.navn+' '+race.km+' km', raceStatus(w.uke), 'var(--or)');
    strOkter(w.uke).forEach(okt=>{ html2+=chip('Styrke '+okt+' · '+STR_LABEL[okt], strStatus(w.uke,okt), 'var(--pu)'); });
    valgfrie.forEach(runChip);
    if(!html2) html2='<span style="font-size:11px;color:var(--m);font-style:italic">Hvileuke</span>';
    chips.innerHTML=html2;
    card.appendChild(chips);
    g.appendChild(card);
  });
}

function initWsel(){
  const sel=document.getElementById('wsel');
  W.forEach(w=>{const o=document.createElement('option');o.value=w.uke;o.textContent=`Uke ${w.uke} (${w.kaluke}) – ${w.dato}`;sel.appendChild(o);});
}

function cw(d){curW=Math.max(1,Math.min(24,curW+d));document.getElementById('wsel').value=curW;rdw();}

  if(regUke){curW=regUke;document.getElementById('wsel').value=regUke;}
  renderWeek(curW);
}

  document.getElementById('winfo').innerHTML=`
    <div class="ii"><div class="il">Uke</div><div class="iv ac">Uke ${n} (${w.kaluke})</div></div>
    <div class="ii"><div class="il">Dato</div><div class="iv">${w.dato}</div></div>
    ${race?`<div class="ii"><div class="il">Løp</div><div class="iv" style="color:var(--or)">🏁 ${race.navn} ${race.km} km</div></div>`:''}
  `;
  const det=document.getElementById('wdet');det.innerHTML='';
  det.innerHTML='<div style="font-size:11px;color:var(--m);margin-bottom:10px">Fleksible dager – gjennomfør øktene når det passer i løpet av uken.</div>';

  function card(title, badge, bcls, bodyLines){
    const c=document.createElement('div');
    c.className='dcard';
    const body=bodyLines.filter(l=>l&&l.trim()!=='').map((l,i)=>i===0&&title?l:l).join('\n');
    const fmt=bodyLines.filter(l=>l!==null).map(l=>{
      if(l==='' ) return '';
      if(l.startsWith('§H')) return '<strong style="color:var(--pu);display:block;margin-top:8px">'+l.slice(2)+'</strong>';
      return l;
    }).join('\n');
    c.innerHTML='<div class="dhdr"><span class="dn">'+title+'</span><span class="dbadge '+bcls+'">'+badge+'</span></div><div class="dcont">'+fmt+'</div>';
    det.appendChild(c);
  }

  function runCard(o){
    let lines=o.txt.split('\n');
    // fjern evt. innbakt styrke-seksjon
    const strIdx=lines.findIndex(l=>l.trim().startsWith('Styrke '));
    if(strIdx>=0) lines=lines.slice(0,strIdx);
    // dropp første linje (typenavn) – vises som tittel
    const rest=lines.slice(1).filter(l=>l.trim()!=='');
    let badge='',bcls='rol';
    if(o.k==='intervall'){badge='Intervall';bcls='int';
      rest.push('Inntil 6 drag – fritt antall');
    }
    else if(o.k==='roligLop'){badge='Rolig løp + ST';bcls='rol';}
    else if(o.k==='langtur'){badge='Langtur';bcls='rol';}
    else if(o.k==='valgfri1'||o.k==='valgfri2'||o.k==='valgfri3'){badge='Valgfri';bcls='rol';}
    const sv=loggL[n+'_'+o.k]||{};
    const tittel=(o.k==='valgfri1'||o.k==='valgfri2'||o.k==='valgfri3')?(sv.type||o.l):o.l;
    if((o.k==='valgfri1'||o.k==='valgfri2'||o.k==='valgfri3')&&sv.watt) rest.push('Snitt watt: '+sv.watt+' W');
    card(tittel, badge, bcls, rest.length?rest:['–']);
  }

  const alleOkter=runOkter(n);
  const fasteLop=alleOkter.filter(o=>o.k!=='valgfri1'&&o.k!=='valgfri2'&&o.k!=='valgfri3');
  const valgfrie=alleOkter.filter(o=>o.k==='valgfri1'||o.k==='valgfri2'||o.k==='valgfri3');

  // Løpeøkter
  fasteLop.forEach(runCard);

  // Race
  if(race){
    card('🏁 '+race.navn, 'Løp '+race.km+' km', 'lop', ['Dato: '+race.dato]);
  }

  // Styrkeøkter A/B/C
  strOkter(n).forEach(okt=>{
    const ovs=strSrc(okt)[String(n)]||[];
    if(!ovs.length) return;
    card('Styrke '+okt+' – '+STR_LABEL[okt], 'Styrke', 'str', ovs);
  });

  // Valgfrie økter
  valgfrie.forEach(runCard);
}

function normalizeTime(v){
  if(!v) return v;
  const p=v.trim().split(':');
  if(p.length===2) return '0:'+p[0].padStart(2,'0')+':'+p[1].padStart(2,'0');
  if(p.length===3) return p[0]+':'+p[1].padStart(2,'0')+':'+p[2].padStart(2,'0');
  return v;
}
function upL(k,f,v){
  if(!loggL[k])loggL[k]={};
  if(f==='var'||f==='tid') v=normalizeTime(v);
  loggL[k][f]=v;
}
function upLDrag(k,dragNum,field,val){
  if(!loggL[k]) loggL[k]={};
  if(!loggL[k].drags) loggL[k].drags={};
  if(!loggL[k].drags[dragNum]) loggL[k].drags[dragNum]={};
  loggL[k].drags[dragNum][field]=val;
  // Update snitt display – sjekk alltid alle 6 mulige drag, uansett hvilke som er fylt ut
  const baseId=k.replace(/_/g,'-');
  const drags=loggL[k].drags;
  const num=6;
  const tEl=document.getElementById('snitt-tempo-'+baseId);
  const pEl=document.getElementById('snitt-puls-'+baseId);
  const mEl=document.getElementById('snitt-makspuls-'+baseId);
  if(tEl) tEl.querySelector('span').textContent=calcSnittTempo(drags,num);
  if(pEl) pEl.querySelector('span').textContent=calcSnittPuls(drags,num);
  if(mEl) mEl.querySelector('span').textContent=calcSnittMaksPuls(drags,num);
}

function calcSnittTempo(drags, num){
  // Convert mm:ss to seconds, average, convert back
  const vals=[];
  for(let i=1;i<=num;i++){
    const d=drags[i]||{};
    if(d.tempo){
      const parts=d.tempo.split(':');
      if(parts.length===2) vals.push(parseInt(parts[0])*60+parseInt(parts[1]));
    }
  }
  if(!vals.length) return '–';
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  return Math.floor(avg/60)+':'+(avg%60).toString().padStart(2,'0');
}

function calcSnittPuls(drags, num){
  const vals=[];
  for(let i=1;i<=num;i++){
    const d=drags[i]||{};
    if(d.puls) vals.push(parseFloat(d.puls));
  }
  if(!vals.length) return '–';
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)+' bpm';
}

function calcSnittMaksPuls(drags, num){
  const vals=[];
  for(let i=1;i<=num;i++){
    const d=drags[i]||{};
    if(d.makspuls) vals.push(parseFloat(d.makspuls));
  }
  if(!vals.length) return '–';
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)+' bpm';
}

function upS(k,f,v){if(!loggS[k])loggS[k]={};loggS[k][f]=v;}

function setF(key,n,btn){
  if(!loggS[key])loggS[key]={};loggS[key].fol=n;
  btn.closest('tr').querySelectorAll('.fstar').forEach((b,i)=>b.classList.toggle('on',i<n));
}

function savel(t){

      }
      // Snitt tempo fra rolig løpetur og langtur (format mm:ss)
      if((k==='roligLop'||k==='langtur')&&sv.tempo){
        const parts=sv.tempo.split(':');
        if(parts.length===2){
          const secs=parseInt(parts[0])*60+parseInt(parts[1]);

        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const v=c.parsed.y;if(!v)return'';const m=Math.floor(v/60),s=(v%60).toString().padStart(2,'0');return 'Tempo: '+m+':'+s+' min/km';}}}},

          x:{ticks:{color:isDark?'#aaa':'#888',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:12},grid:{display:false},border:{display:false}}

    sb.appendChild(tempoWrap);

  // ── Snitthvilepuls, snittpuls og snittfølelse ────────────────────────────
  const tripleWrap=document.createElement('div');
  tripleWrap.style.cssText='background:var(--s);border-radius:8px;padding:14px;margin-bottom:16px;border:1px solid var(--b)';

  } else {
    const triCanvas=document.createElement('div');
    triCanvas.style.cssText='position:relative;width:100%;height:240px';
    triCanvas.innerHTML='<canvas id="chartTriple" role="img" aria-label="Snitthvilepuls, snittpuls og snittfølelse over tid">Korrelasjon mellom hvilepuls, snittpuls og følelse.</canvas>';
    tripleWrap.appendChild(triCanvas);
    if(window._chartTriple) window._chartTriple.destroy();
    window._chartTriple=new Chart(document.getElementById('chartTriple'),{
      type:'line',
      data:{
        labels:Array.from({length:24},(_,i)=>'U'+(i+1)),
        datasets:[
          {label:'Snitthvilepuls',data:triHvile,borderColor:'#C0306A',backgroundColor:'transparent',fill:false,tension:0.4,pointRadius:4,pointBackgroundColor:'#C0306A',borderWidth:2,spanGaps:false,yAxisID:'y'},
          {label:'Snittpuls (rolig)',data:triPuls,borderColor:'#7030A0',backgroundColor:'transparent',fill:false,tension:0.4,pointRadius:3,pointBackgroundColor:'#7030A0',borderWidth:2,borderDash:[5,4],spanGaps:false,yAxisID:'y'},
          {label:'Snittfølelse',data:triFol,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.07)',fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:'#1D9E75',borderWidth:2,spanGaps:false,yAxisID:'y2'},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>{
            if(c.datasetIndex===2) return 'Følelse: '+c.parsed.y.toFixed(1)+' / 5';
            return c.dataset.label+': '+c.parsed.y+' bpm';
          }}}
        },
        scales:{
          y:{position:'left',ticks:{color:isDarkT?'#aaa':'#888',font:{size:10},callback:v=>v+' bpm'},grid:{color:isDarkT?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'},border:{display:false}},
          y2:{position:'right',min:1,max:5,ticks:{color:isDarkT?'#aaa':'#888',font:{size:10},stepSize:1},grid:{display:false},border:{display:false}},

  // ── Styrke progresjon ────────────────────────────────────────────────
  const strPTitle=document.createElement('h2');
  strPTitle.style.cssText='font-size:16px;font-weight:500;color:var(--a2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';
  strPTitle.textContent='Progresjon styrkeøvelser';
  sb.appendChild(strPTitle);

  let noenStyrkeData=false;
  ['A','B','C'].forEach(okt=>{
    const src=strSrc(okt);
    // Collect all unique exercise names – kun gjeldende program (uke 10+)
    const exNames=[];
    Object.entries(src).forEach(([ukeStr,ovs])=>{
      if(parseInt(ukeStr)<10) return;
      ovs.forEach(ov=>{
        const n=ov.split(' – ')[0];
        if(!exNames.includes(n)) exNames.push(n);
      });
    });

    // Build data per exercise
    const exWithData=[];
    exNames.forEach(name=>{
      const isTimeEx=/Plank|Superman|Planke|Supermann|Push-ups|tåhev|Skrå planke/.test(name);
      const pts=[];
      Object.entries(src).forEach(([ukeStr,ovs])=>{
        const uke=parseInt(ukeStr);
        if(uke<10) return;
        const idx=ovs.findIndex(o=>o.split(' – ')[0]===name);
        if(idx===-1) return;
        const plan=ovs[idx].split(' – ').slice(1).join(' – ');
        const setsM=plan.match(/(\d+)×/);
        const numSets=setsM?parseInt(setsM[1]):3;
        let maxVekt=null, lastReps=null;
        for(let s=1;s<=numSets;s++){
          const safeName2=name.replace(/[^a-zA-Z0-9]/g,'-');const sk=uke+'_'+okt+'_'+safeName2+'_s'+s;
          const sv=loggS[sk]||{};
          if(sv.vekt){ const v=parseFloat(sv.vekt); if(maxVekt===null||v>maxVekt) maxVekt=v; }
          if(sv.reps && lastReps===null) lastReps=sv.reps;
        }
        if(maxVekt!==null||lastReps) pts.push({uke,vekt:maxVekt,reps:lastReps});
      });
      if(pts.length) exWithData.push({name,pts,okt,isTimeEx});
    });

    if(!exWithData.length) return;
    noenStyrkeData=true;

    const oktTitle=document.createElement('h3');
    oktTitle.style.cssText='font-size:13px;font-weight:500;color:var(--pu);margin:18px 0 10px';
    oktTitle.textContent='Styrke '+okt+(STR_LABEL[okt]?' – '+STR_LABEL[okt]:'');
    sb.appendChild(oktTitle);

    const exGrid=document.createElement('div');
    exGrid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:8px';

    exWithData.forEach(({name,pts,isTimeEx})=>{
      const first=pts[0],last=pts[pts.length-1];
      // For time exercises use reps diff, otherwise vekt diff
      const vektDiff=isTimeEx
        ?(first.reps&&last.reps?Math.round((parseFloat(last.reps)-parseFloat(first.reps))*10)/10:null)
        :(first.vekt&&last.vekt?Math.round((last.vekt-first.vekt)*10)/10:null);
      const unit=isTimeEx?(name==='Plank'?' sek':' reps'):' kg';
      const diffCol=vektDiff>0?'var(--a)':vektDiff<0?'var(--or)':'var(--m)';
      const diffStr=vektDiff!==null?(vektDiff>0?'+'+vektDiff+unit:vektDiff+unit):'';

      // Mini SVG line chart for vekt
      let chartSvg='';
      const chartPts=isTimeEx?pts.filter(p=>p.reps):pts.filter(p=>p.vekt);
      const chartVal=p=>isTimeEx?parseFloat(p.reps):p.vekt;
      const vPts=chartPts;
      if(vPts.length>1){
        const W=200,H=50;
        const minV=Math.min(...vPts.map(p=>chartVal(p)));
        const maxV=Math.max(...vPts.map(p=>chartVal(p)));
        const rng=maxV-minV||1;
        const coords=vPts.map((p,i)=>{
          const x=8+i*(W-16)/(vPts.length-1);
          const y=H-8-(chartVal(p)-minV)/rng*(H-16);
          return{x,y,v:chartVal(p)};
        });
        const path=coords.map((c,i)=>(i?'L':'M')+c.x+','+c.y).join(' ');
        const dots=coords.map(c=>'<circle cx="'+c.x+'" cy="'+c.y+'" r="2.5" fill="var(--a2)"/>').join('');
        const firstLbl='<text x="'+coords[0].x+'" y="'+(coords[0].y+(coords[0].y<20?12:-4))+'" font-size="6" fill="var(--m)" text-anchor="middle">'+coords[0].v+'</text>';
        const lastLbl='<text x="'+coords[coords.length-1].x+'" y="'+(coords[coords.length-1].y+(coords[coords.length-1].y<20?12:-4))+'" font-size="7" fill="var(--a2)" text-anchor="middle">'+coords[coords.length-1].v+'</text>';
        chartSvg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="50" style="display:block;margin-top:6px">'
          +'<path d="'+path+'" fill="none" stroke="var(--a2)" stroke-width="1.5" stroke-linejoin="round"/>'
          +dots+firstLbl+lastLbl+'</svg>';
      }

      const card=document.createElement('div');
      card.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:hidden';
      card.innerHTML=
        '<div style="padding:9px 12px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center">'
        +'<strong style="font-size:11px">'+name+'</strong>'
        +'<span style="font-size:11px;color:'+diffCol+'">'+diffStr+'</span>'
        +'</div>'
        +(chartSvg?'<div style="padding:4px 12px 0">'+chartSvg+'</div>':'')
        +'<div style="padding:8px 12px 10px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:10px">'
        +(isTimeEx?'':last.vekt?'<div><span style="color:var(--m)">Siste vekt: </span><strong style="color:var(--a2)">'+last.vekt+' kg</strong></div>':'')
        +(last.reps?'<div><span style="color:var(--m)">'+(isTimeEx&&name==='Plank'?'Siste tid: ':'Siste reps: ')+'</span><strong style="color:var(--a2)">'+last.reps+(isTimeEx&&name==='Plank'?' sek':'')+'</strong></div>':'')
        +'<div><span style="color:var(--m)">Logginger: </span><strong>'+pts.length+'</strong></div>'
        +'</div>';
      exGrid.appendChild(card);
    });
    sb.appendChild(exGrid);
  });
  if(!noenStyrkeData){
    const noStrMsg=document.createElement('p');
    noStrMsg.style.cssText='color:var(--m);font-style:italic;font-size:12px;margin:-4px 0 16px';
    noStrMsg.textContent='Ingen styrkedata registrert ennå. Logg vekt/reps for en øvelse i Registrering, så vises progresjonen her.';
    sb.appendChild(noStrMsg);
  }

  // ── Løpsresultater ───────────────────────────────────────────────────
  const racesList=[
    {uke:1,navn:"Backyard Ultra",km:18,dato:"09.05.2026"},
    {uke:7,navn:"Sommernattsløpet",km:5,dato:"20.06.2026"},
    {uke:8,navn:"EcoTrail Bergen",km:12,dato:"27.06.2026"},
    {uke:19,navn:"Jentemila",km:5,dato:"05.09.2026"},
    {uke:20,navn:"Oslo Maraton",km:10,dato:"12.09.2026"},
    {uke:24,navn:"Hytteplanmila",km:10,dato:"17.10.2026"},
  ];

  const raceTitle=document.createElement('h2');
  raceTitle.style.cssText='font-size:16px;font-weight:500;color:var(--or);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';
  raceTitle.textContent='Løpsresultater';
  sb.appendChild(raceTitle);

  const raceWrap=document.createElement('div');
  raceWrap.style.cssText='display:flex;flex-direction:column;gap:10px;margin-bottom:28px';

  racesList.forEach(r=>{
    const sv=loggL[r.uke+'_race']||{};
    const hasData=sv.tid||sv.sn||sv.km;
    const isMain=r.uke===24;
    const card=document.createElement('div');
    card.style.cssText='background:var(--s);border:'+(isMain?'2px solid var(--a)':hasData?'1px solid var(--or)':'1px solid var(--b)')+';border-radius:8px;padding:14px 16px;display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap';
    card.innerHTML=
      '<div style="min-width:90px">'
      +'<div style="font-size:10px;color:var(--m);margin-bottom:2px">'+r.dato+'</div>'
      +'<div style="font-size:14px;font-weight:500;color:'+(isMain?'var(--a)':'var(--or)')+'">'+r.navn+(isMain?' ★':'')+'</div>'
      +'<div style="font-size:11px;color:var(--m)">'+r.km+' km</div>'
      +'</div>'
      +(hasData?
        '<div style="display:flex;gap:18px;flex-wrap:wrap;font-size:12px">'
        +(sv.tid?'<div><div style="font-size:10px;color:var(--m)">Tid</div><div style="font-weight:500;color:var(--or)">'+sv.tid+'</div></div>':'')
        +(sv.km?'<div><div style="font-size:10px;color:var(--m)">Distanse</div><div style="font-weight:500">'+sv.km+' km</div></div>':'')
        +(sv.tempo?'<div><div style="font-size:10px;color:var(--m)">Snitt tempo</div><div style="font-weight:500;color:var(--a2)">'+sv.tempo+' min/km</div></div>':'')
        +(sv.sn?'<div><div style="font-size:10px;color:var(--m)">Snitt puls</div><div style="font-weight:500">'+sv.sn+' bpm</div></div>':'')
        +(sv.mx?'<div><div style="font-size:10px;color:var(--m)">Maks puls</div><div style="font-weight:500">'+sv.mx+' bpm</div></div>':'')
        +(sv.fol?'<div><div style="font-size:10px;color:var(--m)">Følelse</div><div style="font-weight:500">'+sv.fol+' / 5</div></div>':'')
        +(sv.kom?'<div><div style="font-size:10px;color:var(--m)">Kommentar</div><div style="font-weight:500;max-width:200px">'+sv.kom+'</div></div>':'')
        +'</div>'
        :'<div style="font-size:11px;color:var(--m);font-style:italic">Ikke registrert</div>');
    raceWrap.appendChild(card);

  sb.appendChild(raceWrap);
}

function renderStyrke(){
  const sb=document.getElementById('styrke-body');
  sb.innerHTML='';
  const uker=Array.from({length:24},(_,i)=>i+1);

  function buildTable(title, color, lightColor, exercises, data){
    const wrap=document.createElement('div');
    wrap.style.cssText='margin-bottom:32px;overflow-x:auto';
    const h=document.createElement('h2');
    h.style.cssText='font-family:"Fraunces",serif;font-size:18px;font-weight:900;color:'+color+';margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';
    h.textContent=title;
    wrap.appendChild(h);

    const tbl=document.createElement('table');
    tbl.style.cssText='border-collapse:collapse;min-width:600px;width:100%;font-size:11px';

    // Header row
    const thead=document.createElement('thead');
    let hRow='<tr><th style="text-align:left;padding:6px 10px;background:'+color+';color:#fff;position:sticky;left:0;z-index:2;white-space:nowrap">Øvelse</th>';
    uker.forEach(u=>{
      hRow+='<th style="padding:6px 6px;background:'+lightColor+';color:var(--t);text-align:center;white-space:nowrap">U'+u+'</th>';
    });
    hRow+='</tr>';
    thead.innerHTML=hRow;
    tbl.appendChild(thead);

    const tbody=document.createElement('tbody');
    exercises.forEach(([label, name],rowIdx)=>{
      const tr=document.createElement('tr');
      tr.style.background=rowIdx%2===0?'var(--s2)':'var(--s)';
      let row='<td style="padding:6px 10px;font-weight:500;white-space:nowrap;position:sticky;left:0;background:'+(rowIdx%2===0?'var(--s2)':'var(--s)')+';z-index:1"><span style="color:var(--m);font-size:10px">'+label+'</span> '+name+'</td>';
      uker.forEach(u=>{
        const ovs=data[String(u)]||[];
        let plan='';
        for(const o of ovs){
          if(o.split(' – ')[0]===name){plan=o.split(' – ').slice(1).join(' – ');break;}
        }
        row+='<td style="padding:6px 6px;text-align:center;white-space:nowrap">'+plan+'</td>';
      });
      tr.innerHTML=row;
      tbody.appendChild(tr);

function initReg(){
  const sel=document.getElementById('reg-uke');
  W.forEach(w=>{const o=document.createElement('option');o.value=w.uke;o.textContent=`Uke ${w.uke} (${w.kaluke}) – ${w.dato}`;sel.appendChild(o);});

  // Auto-detect current week based on today's date
  const today=new Date();
  const start=new Date('2026-05-04');
  const diffDays=Math.floor((today-start)/(1000*60*60*24));
  const curUke=Math.min(24,Math.max(1,Math.floor(diffDays/7)+1));
  sel.value=curUke;
  // Sync ukesoversikt to same week
  const wsel=document.getElementById('wsel');
  if(wsel){wsel.value=curUke;curW=curUke;renderWeek(curUke);}
  renderReg();
}

          <span class="smsg" id="msg_${rKey}"></span>

      </div></div>
    `;
    rb.appendChild(raceCard);
  }

  // Ukas styrkeøkter (fleksible – A/B/C fra uke 10)
  const allStr=strOkter(uke).map(okt=>[okt, strSrc(okt)]);

  allStr.forEach(([okt, strData])=>{
    const ovs=strData[String(uke)]||[];

    const tbl=document.createElement('table');tbl.className='stbl';
    tbl.innerHTML=`<thead><tr><th>Øvelse</th><th>Vekt (kg)</th><th>Reps / Sek</th></tr></thead>`;

      const parts=ov.split(' – ');const name=parts[0];const plan=parts.slice(1).join(' – ');

      for(let s=1;s<=numSets;s++){
        const safeName=name.replace(/[^a-zA-Z0-9]/g,'-');const sk=`${uke}_${okt}_${safeName}_s${s}`;const ssv=loggS[sk]||{};
        const isTime=plan.includes('sek');
        // Find last logged value from previous weeks
        let prevVekt='', prevReps='';
        for(let prevUke=uke-1;prevUke>=1;prevUke--){
          const psk=`${prevUke}_${okt}_${safeName}_s${s}`;
          const psv=loggS[psk]||{};
          if(psv.vekt||psv.reps){prevVekt=psv.vekt||'';prevReps=psv.reps||'';break;}
        }
        const hintVekt=prevVekt?`S:${prevVekt}kg`:'kg';
        const hintReps=prevReps?`S:${prevReps}`:(isTime?'sek':'reps');
        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td style="color:var(--m);padding-left:20px;white-space:nowrap">Sett ${s}</td>
          <td><input type="text" placeholder="${hintVekt}" value="${ssv.vekt||''}" onchange="upS('${sk}','vekt',this.value)" style="width:70px"></td>
          <td><input type="text" placeholder="${hintReps}" value="${ssv.reps||''}" onchange="upS('${sk}','reps',this.value)" style="width:70px"></td>
        `;
        tbody.appendChild(tr);

    });
    tbl.appendChild(tbody);
    // Varighet + følelse for strength
    const varDiv=document.createElement('div');
    varDiv.style.cssText='padding:10px 14px 0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px';
    const strVarSk=`${uke}_${okt}_varighet`;
    const strVarSv=loggS[strVarSk]||{};
    const varDivDato=document.createElement('div');
    varDivDato.innerHTML=datoInput(loggS,strVarSk,'upSDato');
    varDiv.appendChild(varDivDato);
    // Build varDiv inputs via DOM to avoid quote issues
    const varDivInp1=document.createElement('div');
    varDivInp1.innerHTML='<div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Varighet</div>';
    const varInput=document.createElement('input');
    varInput.type='text';varInput.placeholder='tt:mm:ss';
    varInput.value=strVarSv.var||'';
    varInput.style.cssText='background:var(--s);border:1px solid var(--b);color:var(--t);font-family:"DM Mono",monospace;font-size:13px;padding:6px 10px;border-radius:4px;width:100%';
    varInput.onchange=function(){if(!loggS[strVarSk])loggS[strVarSk]={};loggS[strVarSk].var=normalizeTime(this.value);};
    varDivInp1.appendChild(varInput);
    varDiv.appendChild(varDivInp1);

    const varDivInp2=document.createElement('div');
    varDivInp2.innerHTML='<div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Følelse</div>';

    folInput.type='number';folInput.min='1';folInput.max='5';folInput.placeholder='1–5';
    folInput.value=strVarSv.fol||'';
    folInput.style.cssText='background:var(--s);border:1px solid var(--b);color:var(--t);font-family:"DM Mono",monospace;font-size:13px;padding:6px 10px;border-radius:4px;width:100%';
    folInput.onchange=function(){if(!loggS[strVarSk])loggS[strVarSk]={};loggS[strVarSk].fol=this.value;};
    varDivInp2.appendChild(folInput);
    varDiv.appendChild(varDivInp2);
    
    // Save row
    const saveRow=document.createElement('div');
    saveRow.style.cssText='padding:10px 14px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--b)';
    const saveBtnEl=document.createElement('button');
    saveBtnEl.className='sbtn';saveBtnEl.style.padding='6px 14px';
    saveBtnEl.textContent='Lagre Styrke '+okt;
    const ikkeBtn=document.createElement('button');
    ikkeBtn.textContent='Ikke utført';
    ikkeBtn.style.cssText='background:none;border:1px solid var(--b);color:var(--m);font-family:"DM Mono",monospace;font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer';
    const saveMsgEl=document.createElement('span');

    saveBtnEl.onclick=()=>saveOkt(null,'msg_str_'+uke+'_'+okt);
    ikkeBtn.onclick=()=>ikkeUtfortStr(uke,okt,'msg_str_'+uke+'_'+okt);
    const angreBtn=document.createElement('button');
    angreBtn.textContent='↩ Angre';
    angreBtn.style.cssText='background:none;border:1px solid var(--b);color:var(--m);font-family:"DM Mono",monospace;font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer';
    angreBtn.onclick=()=>nullstillStrOkt(uke,okt,'msg_str_'+uke+'_'+okt);
    saveRow.appendChild(saveBtnEl);saveRow.appendChild(ikkeBtn);saveRow.appendChild(angreBtn);saveRow.appendChild(saveMsgEl);
    const hpmBodyEl = card.querySelector('.hpm-body') || card;
    hpmBodyEl.appendChild(tbl);
    hpmBodyEl.appendChild(varDiv);
    hpmBodyEl.appendChild(saveRow);
    saveBtnEl.onclick=(function(c,uid,o2){return function(){
      saveOkt(null,'msg_str_'+uid+'_'+o2);
      setTimeout(()=>{
        document.getElementById('ugrid').innerHTML='';
        renderUkesplan();
        renderStats();
        rdwFromReg();
        c.classList.add('hpm-collapsed','hpm-done');
        const pv=c.querySelector('.hpm-preview');
        if(!pv){
          const d=document.createElement('div');
          d.className='hpm-preview';
          d.onclick=function(){hpmExpand(this);};
          d.innerHTML='<div style="display:flex;flex-direction:column;gap:2px"><span style="font-weight:500;color:var(--t)">Styrke '+o2+'</span><span style="font-size:10px;color:var(--a2)">✓ Utført</span></div><span style="color:var(--a);white-space:nowrap">↕ Rediger</span>';
          d.onclick=function(){this.closest('.scard').classList.remove('hpm-collapsed');};
          c.insertBefore(d,c.firstChild);
        } else {
          const s=pv.querySelector('span');
          if(s) s.textContent='✓ Utført';
        }
      },1200);
    };})(card,uke,okt);
    sSection.appendChild(card);
  });
  // If no strength session today, show message
  if(!sSection.querySelector('.scard')){
    const noMsg=document.createElement('p');
    noMsg.style.cssText='color:var(--m);font-style:italic;font-size:12px;padding:8px 0';
    noMsg.textContent='Ingen styrkeøkt planlagt denne uken.';
    sSection.appendChild(noMsg);
  }
  rb.appendChild(sSection);

  // If no optional session logged, show message (should not normally trigger)
  if(!vSection.querySelector('.scard')){
    const noMsg=document.createElement('p');
    noMsg.style.cssText='color:var(--m);font-style:italic;font-size:12px;padding:8px 0';
    noMsg.textContent='Ingen valgfrie økter tilgjengelig.';
    vSection.appendChild(noMsg);
  }
  rb.appendChild(vSection);

  // ── SØVNREGISTRERING (egen seksjon, plasseres sist) ──────────────────────
  const sovnSection=document.createElement('div');
  sovnSection.style.marginTop='28px';
  sovnSection.innerHTML=`<h2 style="font-family:'Fraunces',serif;font-size:18px;font-weight:900;color:#2a7abf;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--b)">Søvnregistrering – Uke ${uke}</h2>`;

  const sovnCard = document.createElement('div');

  sovnCard.style.cssText = 'background:var(--s);border-radius:8px;padding:0;margin-bottom:16px;border:1px solid var(--b)';
  
  const sovnKey = `${uke}_sovn`;

      <div class="hpm-preview" onclick="this.closest('.scard').classList.remove('hpm-collapsed')">

      <div class="hpm-body"></div>`;
    const bodyDiv = sovnCard.querySelector('.hpm-body');

    header.style.cssText = 'padding:12px 14px 8px;border-bottom:1px solid var(--b)';

}

function buildSøvnBody(uke, sovnSv) {
  const body = document.createElement('div');
  body.style.cssText = 'padding:12px 14px';
  const days = [
    {k:'man', l:'Mandag'},{k:'tir', l:'Tirsdag'},{k:'ons', l:'Onsdag'},
    {k:'tor', l:'Torsdag'},{k:'fre', l:'Fredag'},{k:'lor', l:'Lørdag'},
    {k:'son', l:'Søndag'}
  ];
  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px';
  
  days.forEach(({k, l}) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px';
    const lbl = document.createElement('label');
    lbl.style.cssText = 'font-size:11px;color:var(--m);font-weight:500';
    lbl.textContent = l;
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = 'tt:mm';
    inp.value = sovnSv['var_'+k] || '';
    inp.style.cssText = 'padding:6px 8px;border:1px solid var(--b);border-radius:4px;font-size:12px;font-family:var(--mono,monospace);background:var(--s2);color:var(--t);width:100%;box-sizing:border-box';
    inp.oninput = () => {
      if(!loggL[`${uke}_sovn`]) loggL[`${uke}_sovn`] = {};
      loggL[`${uke}_sovn`]['var_'+k] = inp.value;
    };
    const puls = document.createElement('input');
    puls.type = 'number';
    puls.placeholder = 'Hvilepuls';
    puls.value = sovnSv['puls_'+k] || '';
    puls.min = 30; puls.max = 100;
    puls.style.cssText = 'padding:6px 8px;border:1px solid var(--b);border-radius:4px;font-size:12px;background:var(--s2);color:var(--t);width:100%;box-sizing:border-box;margin-top:3px';
    puls.oninput = () => {
      if(!loggL[`${uke}_sovn`]) loggL[`${uke}_sovn`] = {};
      loggL[`${uke}_sovn`]['puls_'+k] = puls.value;
    };
    const kom = document.createElement('input');
    kom.type = 'text';
    kom.placeholder = 'Kommentar';
    kom.value = sovnSv['kom_'+k] || '';
    kom.style.cssText = 'padding:6px 8px;border:1px solid var(--b);border-radius:4px;font-size:11px;background:var(--s2);color:var(--t);width:100%;box-sizing:border-box;margin-top:3px';
    kom.oninput = () => {
      if(!loggL[`${uke}_sovn`]) loggL[`${uke}_sovn`] = {};
      loggL[`${uke}_sovn`]['kom_'+k] = kom.value;
    };
    wrap.appendChild(lbl);
    wrap.appendChild(inp);
    wrap.appendChild(puls);
    wrap.appendChild(kom);
    grid.appendChild(wrap);
  });
  
  body.appendChild(grid);
  
  const saveBtn = document.createElement('button');
  saveBtn.className = 'sbtn';
  saveBtn.style.cssText = 'background:var(--a);color:#fff;border:none;padding:8px 18px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--mono,monospace)';
  saveBtn.textContent = 'LAGRE SØVN';
  saveBtn.onclick = () => {
    if(!loggL[`${uke}_sovn`]) loggL[`${uke}_sovn`] = {};
    localStorage.setItem('hpm_l', JSON.stringify(loggL));
    fbSave();
    const daysLogged = ['man','tir','ons','tor','fre','lor','son']
      .filter(d => loggL[`${uke}_sovn`]['var_'+d]).length;
    hpmCollapse(`hpm_${uke}_sovn`, `${daysLogged} dager registrert`);
    setTimeout(() => renderStats(), 1400);
  };
  body.appendChild(saveBtn);
  return body;
}



function ikkeUtfort(key, msgId){
  if(!loggL[key]) loggL[key]={};
  loggL[key].ikkeUtfort=true;
  loggL[key]['var']='';loggL[key].sn='';loggL[key].km='';
  try{
    localStorage.setItem('hpm_l',JSON.stringify(loggL));
        const el=document.getElementById(msgId);
    if(el){el.textContent='✗ Ikke utført';el.style.color='var(--or)';setTimeout(()=>{el.textContent='';el.style.color='';},2000);}
    hpmCollapse(key.replace(/_/g,'-'), '✗ Ikke utført', true);
    setTimeout(()=>{
      document.getElementById('ugrid').innerHTML='';renderUkesplan();renderStats();rdwFromReg();
    }, 800);

  }catch(e){}
}

function ikkeUtfortStr(uke, okt, msgId){
  // Mark all sets as not done
  const src=strSrc(okt);
  const ovs=src[String(uke)]||[];
  ovs.forEach((ov,i)=>{
    const sn=ov.split(' – ')[0].replace(/[^a-zA-Z0-9]/g,'-');
    for(let s=1;s<=4;s++){
      const sk=`${uke}_${okt}_${sn}_s${s}`;
      if(!loggS[sk]) loggS[sk]={};
      loggS[sk].ikkeUtfort=true;
    }
  });
  try{
    localStorage.setItem('hpm_s',JSON.stringify(loggS));
        const el=document.getElementById(msgId);
    if(el){el.textContent='✗ Ikke utført';el.style.color='var(--or)';setTimeout(()=>{el.textContent='';el.style.color='';},2000);}
    const c=document.getElementById('hpm-str-'+uke+'-'+okt);
    if(c){
      c.classList.add('hpm-collapsed','hpm-ikke');
      let pv=c.querySelector('.hpm-preview');
      if(!pv){
        pv=document.createElement('div');
        pv.className='hpm-preview';
        pv.onclick=function(){hpmExpand(this);};
        c.insertBefore(pv,c.firstChild);
      }
      pv.innerHTML='<div style="display:flex;flex-direction:column;gap:2px"><span style="font-weight:500;color:var(--t)">Styrke '+okt+'</span><span style="font-size:10px;color:var(--or)">✗ Ikke utført</span></div><span style="color:var(--a);white-space:nowrap">↕ Rediger</span>';
    }
    setTimeout(()=>{
      document.getElementById('ugrid').innerHTML='';renderUkesplan();renderStats();rdwFromReg();
    }, 800);
  }catch(e){}
}


function hpmCollapse(id, text, isIkke){
  const el=document.getElementById('hpm_'+id);
  if(!el) return;
  el.classList.add('hpm-collapsed');
  el.classList.add(isIkke?'hpm-ikke':'hpm-done');
  const prev=el.querySelector('.hpm-preview');
  if(prev){
    // Get name from scardh h3 if available
    const h3=el.querySelector('.scardh h3');
    const name=h3?h3.childNodes[0].textContent.trim():'';
    const statusText=isIkke?'✗ Ikke utført':text||'✓ Utført';
    const statusColor=isIkke?'var(--or)':'var(--a2)';
    prev.innerHTML='<div style="display:flex;flex-direction:column;gap:2px">'
      +(name?'<span style="font-weight:500;color:var(--t)">'+name+'</span>':'')
      +'<span style="font-size:10px;color:'+statusColor+'">'+statusText+'</span>'
      +'</div>'
      +'<span style="color:var(--a);white-space:nowrap">↕ Rediger</span>';
  }
}
function hpmExpand(el){
  el.closest('.scard').classList.remove('hpm-collapsed');
}
function saveOkt(key, msgId){
  try{
    localStorage.setItem('hpm_l',JSON.stringify(loggL));
    localStorage.setItem('hpm_s',JSON.stringify(loggS));
    fbSave();
    const el=document.getElementById(msgId);
    if(el){el.textContent='✓ Utført';setTimeout(()=>el.textContent='',2000);}
    if(key){
      const sv=loggL[key]||{};
      const parts=[];
      if(sv['var']) parts.push(sv['var']);
      if(sv.km) parts.push(sv.km+' km');

// ── Prognose ─────────────────────────────────────────────────────────────
function renderPrognose(){
  const sb=document.getElementById('prognose-body');
  sb.innerHTML='';

  // ── Helper: parse "h:mm:ss" or "m:ss" → total seconds
  function tidTilSek(s){
    if(!s) return null;
    const p=s.trim().split(':').map(Number);
    if(p.length===3) return p[0]*3600+p[1]*60+p[2];
    if(p.length===2) return p[0]*60+p[1];
    return null;
  }

  // ── Helper: seconds → "h:mm:ss" or "mm:ss"
  function sekTilTid(s){
    s=Math.round(s);
    const h=Math.floor(s/3600);
    const m=Math.floor((s%3600)/60);
    const sc=s%60;
    if(h>0) return h+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');
    return m+':'+String(sc).padStart(2,'0');
  }

  // ── Helper: seconds/km → "m:ss min/km"
  function sekPerKmTilTempo(spk){
    const m=Math.floor(spk/60);
    const s=Math.round(spk%60);
    return m+':'+String(s).padStart(2,'0')+' min/km';
  }

  // ── Riegel formula: T2 = T1 * (D2/D1)^1.06
  function riegel(t1, d1, d2){ return t1 * Math.pow(d2/d1, 1.06); }

  // ── All races with logged data
  const racesList=[
    {uke:1,navn:'Backyard Ultra',km:18,dato:'09.05.2026'},
    {uke:7,navn:'Sommernattsløpet',km:5,dato:'20.06.2026'},
    {uke:8,navn:'EcoTrail Bergen',km:12,dato:'27.06.2026'},
    {uke:19,navn:'Jentemila',km:5,dato:'05.09.2026'},
    {uke:20,navn:'Oslo Maraton',km:10,dato:'12.09.2026'},
    {uke:24,navn:'Hytteplanmila',km:10,dato:'17.10.2026'},
  ];

  // ── Collect all usable reference points (race + tempo + langtur)
  let refs=[];

  // From pre-plan historical races
  PRE_RACE.forEach(r=>{
    const sek=tidTilSek(r.tid);
    if(sek&&r.km) refs.push({kilde:r.navn+' ('+r.dato+')', km:r.km, sek, type:'løp', pre:true});
  });

  // From races
  racesList.forEach(r=>{
    const sv=loggL[r.uke+'_race']||{};
    const sek=tidTilSek(sv.tid);
    const dist=parseFloat(sv.km)||r.km;
    if(sek&&dist) refs.push({kilde:r.navn+' ('+r.dato+')',km:dist,sek,type:'løp'});
  });



  // ── Target distances
  const targets=[
    {label:'5 km',dist:5,emoji:'🏃'},
    {label:'10 km',dist:10,emoji:'🏃'},
    {label:'Halvmaraton (21,1 km)',dist:21.0975,emoji:'🏅'},
    {label:'Maraton (42,2 km)',dist:42.195,emoji:'🏆'},
  ];

  // ── Goal for Hytteplanmila
  const GOAL_DIST=10;
  const GOAL_SEK=55*60; // 55:00

  // ── Header
  const hdr=document.createElement('div');
  hdr.style.cssText='margin-bottom:28px';
  hdr.innerHTML='<h2 style="font-family:\'Fraunces\',serif;font-size:22px;font-weight:900;color:var(--a);margin-bottom:6px">Løpsprognose</h2>';
  sb.appendChild(hdr);

  // ── Historiske løp (før plan)
  const preTitle=document.createElement('h3');
  preTitle.style.cssText='font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:10px;font-weight:500';
  preTitle.textContent='Historiske løp (grunnlag)';
  sb.appendChild(preTitle);

  const preWrap=document.createElement('div');
  preWrap.style.cssText='display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px';
  PRE_RACE.forEach(r=>{
    const c=document.createElement('div');
    c.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:12px 15px;font-size:11px;min-width:200px';
    c.innerHTML='<div style="font-size:10px;color:var(--m);margin-bottom:3px">'+r.dato+'</div>'
      +'<div style="font-weight:500;color:var(--t);margin-bottom:8px">'+r.navn+'</div>'
      +'<div style="display:flex;gap:14px;flex-wrap:wrap">'
      +'<div><div style="font-size:9px;color:var(--m)">TID</div><div style="font-weight:500;color:var(--or)">'+r.tid+'</div></div>'
      +'<div><div style="font-size:9px;color:var(--m)">TEMPO</div><div style="font-weight:500;color:var(--a2)">'+r.tempo+' /km</div></div>'
      +'<div><div style="font-size:9px;color:var(--m)">SNITTPULS</div><div style="font-weight:500">'+r.sn+' bpm</div></div>'
      +'<div><div style="font-size:9px;color:var(--m)">MAKSPULS</div><div style="font-weight:500">'+r.mx+' bpm</div></div>'
      +'</div>';
    preWrap.appendChild(c);
  });
  sb.appendChild(preWrap);

  if(refs.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:28px 20px;color:var(--m);font-size:12px;text-align:center';
    empty.innerHTML='<div style="font-size:24px;margin-bottom:10px">📋</div>'
      +'<div style="font-weight:500;color:var(--t);margin-bottom:6px">Ingen data å beregne fra ennå</div>'
      +'<div>Registrer løpsresultater (tid + distanse) under <strong>Registrering</strong> for å se prognoser her.</div>';
    sb.appendChild(empty);
    return;
  }

  // ── Best estimate per target: use the reference point giving lowest time
  // (most recent race is also shown separately)

  // For each reference, compute all target estimates
  const allEstimates=refs.map(ref=>{
    const ests=targets.map(t=>{
      const sek=riegel(ref.sek, ref.km, t.dist);
      return {dist:t.dist,label:t.label,emoji:t.emoji,sek};
    });
    return {ref, ests};
  });

  // ── Prognose-kort: én rad per target, beste estimat + goal-indikator
  const progTitle=document.createElement('h3');
  progTitle.style.cssText='font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:14px;font-weight:500';
  progTitle.textContent='Beste estimat per distanse';
  sb.appendChild(progTitle);

  const progGrid=document.createElement('div');
  progGrid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:32px';

  targets.forEach(t=>{
    // Find best (fastest) estimate across all refs
    let best=null;
    allEstimates.forEach(ae=>{
      const e=ae.ests.find(x=>x.dist===t.dist);
      if(e&&(!best||e.sek<best.sek)) best={sek:e.sek,ref:ae.ref};
    });

    const card=document.createElement('div');
    const isGoalDist=(t.dist===GOAL_DIST);
    const goalDiff=isGoalDist&&best? best.sek-GOAL_SEK : null;
    const aheadOfGoal=goalDiff!==null&&goalDiff<=0;
    const borderColor=isGoalDist?'var(--a)':'var(--b)';

    card.style.cssText='background:var(--s);border:2px solid '+borderColor+';border-radius:10px;padding:18px 16px;position:relative;overflow:hidden';

    let goalBadge='';
    if(isGoalDist&&best){
      const diffStr=Math.abs(Math.round(goalDiff));
      const diffMin=Math.floor(diffStr/60);
      const diffSek=diffStr%60;
      const diffLabel=diffMin>0?diffMin+':'+String(diffSek).padStart(2,'0'):diffSek+' sek';
      goalBadge='<div style="margin-top:10px;padding:6px 10px;border-radius:6px;font-size:10px;background:'
        +(aheadOfGoal?'rgba(0,140,0,.12)':'rgba(192,48,106,.1)')
        +';color:'+(aheadOfGoal?'#2a7a2a':'var(--a)')
        +';font-weight:500">★ Mål 55:00 — '
        +(aheadOfGoal?diffLabel+' foran plan':'Mangler '+diffLabel+' på planen')
        +'</div>';
    }

    card.innerHTML=
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
      +'<span style="font-size:22px">'+t.emoji+'</span>'
      +'<div><div style="font-size:14px;font-weight:500;color:var(--t)">'+t.label+'</div>'
      +(isGoalDist?'<div style="font-size:10px;color:var(--a)">Hytteplanmila ★</div>':'')
      +'</div></div>'
      +(best?
        '<div style="font-size:28px;font-family:\'Fraunces\',serif;font-weight:900;color:var(--a);line-height:1">'+sekTilTid(best.sek)+'</div>'
        +'<div style="font-size:10px;color:var(--m);margin-top:4px">'+sekPerKmTilTempo(best.sek/t.dist)+'</div>'
        +'<div style="font-size:10px;color:var(--m);margin-top:6px;border-top:1px solid var(--b);padding-top:6px">Grunnlag: '+best.ref.kilde+'</div>'
        +goalBadge
        :'<div style="color:var(--m);font-size:12px;font-style:italic">Ingen data</div>');
    progGrid.appendChild(card);
  });
  sb.appendChild(progGrid);

  // ── Detaljert tabell: alle referanser × alle distanser
  const tblTitle=document.createElement('h3');
  tblTitle.style.cssText='font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:14px;font-weight:500';
  tblTitle.textContent='Alle estimater per referanseøkt';
  sb.appendChild(tblTitle);

  const tblWrap=document.createElement('div');
  tblWrap.style.cssText='overflow-x:auto;margin-bottom:28px';

  const tbl=document.createElement('table');
  tbl.className='ltbl';
  tbl.style.minWidth='600px';

  const thead=document.createElement('thead');
  thead.innerHTML='<tr>'
    +'<th>Referanse</th>'
    +'<th>Distanse</th>'
    +'<th>Tid</th>'
    +'<th style="color:var(--a)">5 km</th>'
    +'<th style="color:var(--a)">10 km</th>'
    +'<th style="color:var(--a)">21,1 km</th>'
    +'<th style="color:var(--a)">42,2 km</th>'
    +'</tr>';
  tbl.appendChild(thead);

  const tbody=document.createElement('tbody');
  allEstimates.forEach(ae=>{
    const tr=document.createElement('tr');
    const preLabel=ae.ref.pre?'<span style="font-size:9px;background:var(--s2);border:1px solid var(--b);border-radius:3px;padding:1px 5px;color:var(--m);margin-left:5px;vertical-align:middle">før plan</span>':'';
    tr.innerHTML='<td style="color:var(--t);max-width:180px;white-space:normal">'+ae.ref.kilde+preLabel+'</td>'
      +'<td>'+ae.ref.km+' km</td>'
      +'<td style="font-weight:500">'+sekTilTid(ae.ref.sek)+'</td>'
      +ae.ests.map(e=>'<td style="font-family:\'Fraunces\',serif;font-weight:900;color:var(--a2)">'+sekTilTid(e.sek)+'<div style="font-size:9px;color:var(--m);font-family:\'DM Mono\',monospace;font-weight:400">'+sekPerKmTilTempo(e.sek/e.dist)+'</div></td>').join('');
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  tblWrap.appendChild(tbl);
  sb.appendChild(tblWrap);


}

        if(harData){
          lopRows.push({
            'Uke':uke,'Periode':w.dato||'','Type':'Løp: '+race.navn,'Dato':sv.dato||race.dato||'',
            'Varighet':sv.tid||'','Distanse (km)':sv.km||race.km||'','Snitt tempo':sv.tempo||'',
            'Snitt puls':sv.sn||'','Maks puls':sv.mx||'','Sykkel-watt':'',
            'Følelse (1-5)':sv.fol||'','Kommentar':sv.kom||'','Ikke utført':sv.ikkeUtfort?'Ja':''
          });
        }
      }
    }

    // ── 2) Intervall – drag-detaljer ─────────────────────────────────────
    const dragRowsX=[];
    for(let uke=1;uke<=24;uke++){
      const sv=loggL[uke+'_intervall'];
      if(!sv||!sv.drags) continue;
      Object.keys(sv.drags).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(dnum=>{
        const d=sv.drags[dnum];
        if(!d.tempo&&!d.puls&&!d.makspuls) return;
        dragRowsX.push({'Uke':uke,'Drag':parseInt(dnum),'Tempo':d.tempo||'','Snitt puls':d.puls||'','Maks puls':d.makspuls||''});
      });
    }

    // ── 3) Styrke – per sett ──────────────────────────────────────────────
    const strRows=[];
    for(let uke=1;uke<=24;uke++){
      ['A','B','C'].forEach(okt=>{
        const src=strSrc(okt);
        const exs=src[String(uke)]||[];
        exs.forEach(ex=>{
          const name=ex.split(' – ')[0];
          const safeName=name.replace(/[^a-zA-Z0-9]/g,'-');
          for(let s=1;s<=4;s++){
            const sk=uke+'_'+okt+'_'+safeName+'_s'+s;
            const sv=loggS[sk];
            if(!sv) continue;
            if(!sv.vekt&&!sv.reps&&!sv.ikkeUtfort) continue;
            strRows.push({
              'Uke':uke,'Økt':okt+' – '+STR_LABEL[okt],'Øvelse':name,'Sett':s,
              'Vekt (kg)':sv.vekt||'','Reps/Sek':sv.reps||'','Ikke utført':sv.ikkeUtfort?'Ja':''
            });
          }
        });
      });
    }

    // ── 4) Styrke – økt-sammendrag (dato/varighet/følelse) ───────────────
    const strOktRows=[];
    for(let uke=1;uke<=24;uke++){
      ['A','B','C'].forEach(okt=>{
        const sv=loggS[uke+'_'+okt+'_varighet'];
        if(!sv) return;
        if(!sv.dato&&!sv['var']&&!sv.fol) return;
        strOktRows.push({'Uke':uke,'Økt':okt+' – '+STR_LABEL[okt],'Dato':sv.dato||'','Varighet':sv['var']||'','Følelse (1-5)':sv.fol||''});
      });
    }

    // ── 5) Søvn ───────────────────────────────────────────────────────────
    const sovnRows=[];
    for(let uke=1;uke<=24;uke++){
      const sv=loggL[uke+'_sovn'];
      if(!sv) continue;
      dayList.forEach(d=>{
        const v=sv['var_'+d], p=sv['puls_'+d], k=sv['kom_'+d];
        if(!v&&!p&&!k) return;
        sovnRows.push({'Uke':uke,'Dag':dayNames[d],'Varighet (tt:mm)':v||'','Hvilepuls':p||'','Kommentar':k||''});
      });
    }

    const totalRows=lopRows.length+dragRowsX.length+strRows.length+strOktRows.length+sovnRows.length;
    if(totalRows===0){
      msgEl.style.color='var(--m)';
      msgEl.textContent='Ingen data registrert ennå – ingenting å eksportere.';
      return;
    }

    const wb=XLSX.utils.book_new();
    function addSheet(rows, name, emptyCols){
      const ws=rows.length?XLSX.utils.json_to_sheet(rows):XLSX.utils.aoa_to_sheet([emptyCols]);
      XLSX.utils.book_append_sheet(wb, ws, name);
    }
    addSheet(lopRows, 'Løpeøkter', ['Uke','Periode','Type','Dato','Varighet','Distanse (km)','Snitt tempo','Snitt puls','Maks puls','Sykkel-watt','Følelse (1-5)','Kommentar','Ikke utført']);
    addSheet(dragRowsX, 'Intervall-drag', ['Uke','Drag','Tempo','Snitt puls','Maks puls']);
    addSheet(strRows, 'Styrke', ['Uke','Økt','Øvelse','Sett','Vekt (kg)','Reps/Sek','Ikke utført']);
    addSheet(strOktRows, 'Styrke-økt', ['Uke','Økt','Dato','Varighet','Følelse (1-5)']);
    addSheet(sovnRows, 'Søvn', ['Uke','Dag','Varighet (tt:mm)','Hvilepuls','Kommentar']);

    const filnavn='Marias_treningsdagbok_eksport_'+todayISO()+'.xlsx';
    XLSX.writeFile(wb, filnavn);
    msgEl.style.color='var(--a2)';
    msgEl.textContent='✓ Lastet ned '+filnavn;
    setTimeout(()=>{msgEl.textContent='';},4000);
  }catch(e){
    console.error('Eksportfeil:', e);
    msgEl.style.color='var(--or)';
    msgEl.textContent='Noe gikk galt under eksport: '+e.message;
  }
}

</script>
