<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treningsdagbok</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,900;1,300&display=swap');
:root{--bg:#fff0f3;--s:#fff5f7;--s2:#ffe8ed;--b:#f5c0cc;--t:#2a1a1e;--m:#8a5a65;--a:#c0306a;--a2:#e05585;--or:#c05020;--pu:#7030a0;--bl:#2050a0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'DM Mono',monospace;font-size:13px;line-height:1.6;min-height:100vh}
.hdr{padding:28px 24px 20px;border-bottom:1px solid var(--b)}
.hdr h1{font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--a)}
.hdr-sub{color:var(--m);font-size:11px;margin-top:2px}
.cd{color:var(--a2);font-size:11px;margin-top:4px}
nav{display:flex;border-bottom:1px solid var(--b);overflow-x:auto}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--m);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;padding:12px 16px;white-space:nowrap;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
nav button:hover{color:var(--t)}
nav button.active{color:var(--a);border-bottom-color:var(--a)}
main{padding:20px 24px;max-width:1400px}
.view{display:none}
.view.active{display:block}

.ugrid{display:grid;grid-template-columns:70px 80px 100px repeat(7,1fr);gap:0;background:var(--bg);border:1px solid #c8909a;font-size:11px}
.ucell{background:var(--s);padding:6px 8px;min-height:40px;display:flex;align-items:center;border-right:1px solid #c8909a;border-bottom:1px solid #c8909a;font-weight:500}
.uhdr{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px;justify-content:center;text-align:center;border-right:1px solid #c8909a;border-bottom:1px solid #c8909a}
.uke-n{font-weight:500;color:var(--a);cursor:pointer;justify-content:center;flex-direction:column;align-items:center;gap:0;text-align:center}
.uke-n:hover{color:#fff}
.hvile{color:var(--m);font-style:italic}
.race-c{color:var(--or);font-weight:500}
.fl-b{border-left:3px solid #4a8a4a}.fl-O{border-left:3px solid #4a4a8a}
.fl-T{border-left:3px solid #8a8a4a}.fl-N{border-left:3px solid #8a4a4a}
.fl-D{border-left:3px solid var(--pu)}.fl-P{border-left:3px solid var(--a2)}

.wsel{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.wsel select,.lctrl select{background:var(--s);border:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:12px;padding:7px 11px;border-radius:4px;cursor:pointer}
.wnav{background:var(--s);border:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:14px;padding:5px 13px;border-radius:4px;cursor:pointer;transition:all .15s}
.wnav:hover{border-color:var(--a);color:var(--a)}
.winfo{background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:11px 15px;margin-bottom:18px;display:flex;gap:22px;flex-wrap:wrap;font-size:11px}
.ii{display:flex;flex-direction:column;gap:2px}
.il{color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.iv{color:var(--t);font-weight:500}
.iv.ac{color:var(--a)}
.wdet{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px}
.dcard{background:var(--s);border:1px solid var(--b);border-radius:6px;overflow:hidden;transition:border-color .15s}
.dcard:hover{border-color:#444}
.dcard.hvile-c{opacity:.5}
.dcard.race-d{border-color:var(--or)}
.dhdr{padding:9px 13px;background:var(--s2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b)}
.dn{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--m);font-weight:500}
.dbadge{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--b);color:var(--m)}
.dbadge.int{background:#1a3a1a;color:var(--a)}
.dbadge.tmp{background:#3a2a1a;color:var(--or)}
.dbadge.rol{background:#1a1a3a;color:var(--bl)}
.dbadge.str{background:#2a1a3a;color:var(--pu)}
.dbadge.lop{background:#3a1a0a;color:var(--or)}
.dcont{padding:11px 13px;white-space:pre-wrap;font-size:11px;line-height:1.7}

.lctrl{display:flex;gap:11px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sbtn{background:var(--a);color:#000;border:none;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:7px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.sbtn:hover{opacity:.85}
.smsg{color:var(--a2);font-size:11px}
.ltbl{width:100%;border-collapse:collapse;font-size:11px}
.ltbl th{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px 11px;text-align:left;border-bottom:1px solid var(--b);font-weight:500}
.ltbl td{padding:7px 11px;border-bottom:1px solid var(--b);vertical-align:middle}
.ltbl tr:hover td{background:var(--s2)}
.ltbl input,.ltbl select{background:transparent;border:none;border-bottom:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:11px;padding:2px 3px}
.ltbl input:focus{outline:none;border-bottom-color:var(--a)}

.scard{background:var(--s);border:1px solid var(--b);border-radius:6px;margin-bottom:16px;overflow:hidden}
.scardh{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.scardh h3{font-size:12px;font-weight:500;color:var(--pu)}
.scardh span{font-size:10px;color:var(--m)}
.stbl{width:100%;border-collapse:collapse;font-size:11px}
.stbl th{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:7px 11px;text-align:left;border-bottom:1px solid var(--b);font-weight:500}
.stbl td{padding:6px 11px;border-bottom:1px solid var(--b);vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--s2)}
.stbl input{background:transparent;border:none;border-bottom:1px solid var(--b);color:var(--t);font-family:'DM Mono',monospace;font-size:11px;padding:2px 3px}
.stbl input:focus{outline:none;border-bottom-color:var(--pu)}
.fsel{display:flex;gap:3px}
.fstar{background:none;border:1px solid var(--b);color:var(--m);width:22px;height:22px;border-radius:3px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'DM Mono',monospace}
.fstar.on{background:#2a1e00;color:var(--or);border-color:var(--or)}

.igrid{display:grid;grid-template-columns:60px 70px 110px 1fr 80px 180px;gap:1px;background:var(--b);border:1px solid var(--b);font-size:11px}
.icell{background:var(--s);padding:7px 9px;min-height:33px;display:flex;align-items:center;white-space:pre-wrap}
.ihdr{background:var(--s2);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px}
.bwrap{width:100%;background:var(--b);height:5px;border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;background:var(--a)}
.bfill.dl{background:var(--pu)}.bfill.tp{background:var(--a2)}
.tpill{font-size:10px;padding:2px 7px;border-radius:99px;white-space:nowrap}
.tl{background:#1a3a1a;color:var(--a)}.t45{background:#1a2a3a;color:var(--bl)}
.t8{background:#3a2a1a;color:var(--or)}.tdl{background:#2a1a3a;color:var(--pu)}

.rlist{display:flex;flex-direction:column;gap:11px}
.rcard{background:var(--s);border:1px solid var(--b);border-left:3px solid var(--or);border-radius:6px;padding:15px 19px;display:flex;align-items:center;gap:18px}
.rcard.main{border-left-color:var(--a)}
.rdate{color:var(--m);font-size:11px;min-width:80px}
.rname{font-size:14px;font-weight:500}
.rkm{color:var(--or);font-size:11px}
.ruke{color:var(--m);font-size:10px;margin-left:auto}

.zgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:11px;margin-bottom:28px}
.zcard{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:15px}
.zcard h3{font-size:20px;font-weight:700;color:var(--a);margin-bottom:3px}
.zname{color:var(--m);font-size:11px;margin-bottom:7px}
.zbpm{font-size:15px;font-weight:500;margin-bottom:3px}
.zdesc{font-size:10px;color:var(--m);line-height:1.5}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}



.hpm-collapsed .hpm-body{display:none}
.hpm-preview{display:none;padding:10px 14px;align-items:center;justify-content:space-between;cursor:pointer;font-size:11px;gap:8px}
.hpm-preview:hover{background:var(--s2)}
.hpm-collapsed .hpm-preview{display:flex}
.hpm-done{border-left:3px solid var(--a2)!important}
.hpm-ikke{border-left:3px solid var(--or)!important}

/* Auth styles */
body.guest .sbtn { display: none !important; }
body.guest button[onclick*="ikkeUtfort"] { display: none !important; }
body.guest button[onclick*="nullstill"] { display: none !important; }
body.guest button[onclick*="Angre"] { display: none !important; }
body.guest button[onclick*="angre"] { display: none !important; }
body.guest .smsg { display: none !important; }
body.guest .scard button:not(.sbtn) { display: none !important; }
body.guest #auth-banner { background: var(--s2); padding: 6px 12px; border-radius: 4px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
function nullstillUke(){
  const uv=document.getElementById('reg-uke').value;
  if(!uv) return;
  const uke=parseInt(uv);
  if(!confirm('Nullstille all logging for uke '+uke+'?')) return;
  // Delete all running sessions
  ['intervall','roligLop','tempo','langtur','race'].forEach(k=>{
    delete loggL[uke+'_'+k];
  });
  // Delete all strength sessions
  ['A','B'].forEach(okt=>{
    const src=okt==='A'?SA:SB;
    const ovs=src[String(uke)]||[];
    ovs.forEach((ov,i)=>{
      const sn=ov.split(' – ')[0].replace(/[^a-zA-Z0-9]/g,'-');
      for(let s=1;s<=4;s++){
        delete loggS[uke+'_'+okt+'_'+sn+'_s'+s];
      }
    });
  });
  localStorage.setItem('hpm_l', JSON.stringify(loggL));
  localStorage.setItem('hpm_s', JSON.stringify(loggS));
  fbSave();
  document.getElementById('ugrid').innerHTML='';
  renderUkesplan();
  renderStats();
  renderReg();

  ['Uke','Dato','Fase','Man','Tir','Ons','Tor','Fre','Lør','Søn'].forEach(h=>{
    const d=document.createElement('div');d.className='ucell uhdr';d.textContent=h;g.appendChild(d);

      if(t.startsWith('Tempoøkt')) dayToLoggKey[d]=`${w.uke}_tempo`;

      if(t.startsWith('Styrke A')&&!t.includes('Intervall')) dayToLoggKey[d]=`${w.uke}_strA`;
      if(t.startsWith('Styrke B')&&!t.includes('Intervall')) dayToLoggKey[d]=`${w.uke}_strB`;

      // lor: show checkmark if Styrke A logged (only non-race weeks)
      // Find actual days for Styrke A and B
      const strADay=Object.keys({man:1,tir:1,ons:1,tor:1,fre:1,lor:1,son:1}).find(d=>w[d]&&w[d].split('\n').some(l=>l.trim().startsWith('Styrke A')))||'lor';
      const strBDay=Object.keys({man:1,tir:1,ons:1,tor:1,fre:1,lor:1,son:1}).find(d=>w[d]&&w[d].split('\n').some(l=>l.trim().startsWith('Styrke B')))||'tir';
      const isStrA=k===strADay&&!raceUkes.includes(w.uke)&&loggS[sKeyA]&&(loggS[sKeyA].vekt||loggS[sKeyA].reps);
      const isStrB=k===strBDay&&loggS[sKeyB]&&(loggS[sKeyB].vekt||loggS[sKeyB].reps);
      // For tir: show ✓ only if BOTH intervall AND styrke B are logged
      const tirBothLogged=k==='tir'&&isLogged&&isStrB;
      const tirOnlyRun=k==='tir'&&isLogged&&!isStrB;
      const tirOnlyStr=k==='tir'&&!isLogged&&isStrB;
      const logged=(k==='tir'?tirBothLogged:isLogged)||isStrA;
      const d=document.createElement('div');
      d.className='ucell'+(isH?' hvile':'')+(isR?' race-c':'');
      const label=isH?'—':txt.split('\n')[0];
      let display=label;
      if(isIkke){
        display=`<span style="color:var(--or)">✗</span> <span style="opacity:.5">${label}</span>`;
      } else if(logged){
        display=`<span style="color:var(--a2)">✓</span> <span style="text-decoration:line-through;opacity:.6">${label}</span>`;
      } else if(tirOnlyRun){
        display=`<span style="color:var(--a2);font-size:9px">✓løp</span> ${label}`;
      } else if(tirOnlyStr){
        display=`<span style="color:var(--pu);font-size:9px">✓str</span> ${label}`;
      }
      // For tir: show split status for intervall and styrke B
      if(k==='tir'){
        const hasIntervall=txt.startsWith('Intervall');
        const hasStryrkeB=txt.includes('Styrke B');
        if(hasIntervall && hasStryrkeB){
          const intIcon=isIkke?'✗':isLogged?'✓':'';
          const intIconColor=isIkke?'var(--or)':isLogged?'var(--a2)':'var(--t)';
          const intDeco=isLogged?'line-through':'none';
          const strIcon=isStrB?'✓':'';
          const strIconColor=isStrB?'var(--a2)':'var(--m)';
          const strDeco=isStrB?'line-through':'none';
          d.innerHTML=`<div style="line-height:1.5">
            <div><span style="color:${intIconColor}">${intIcon}</span> <span style="text-decoration:${intDeco};opacity:${isLogged?'.6':'1'};color:var(--t)">Intervall</span></div>
            <div style="border-top:1px solid var(--b);margin-top:2px;padding-top:2px"><span style="color:${strIconColor}">${strIcon}</span> <span style="text-decoration:${strDeco};opacity:${isStrB?'.6':'1'};color:var(--t)">Styrke B</span></div>
          </div>`;
        } else if(hasStryrkeB && !hasIntervall){
          const strIcon=isStrB?'✓ ':'';
          const strColor=isStrB?'var(--a2)':'var(--t)';
          d.innerHTML=`<div style="color:${strColor}">${strIcon}Styrke B</div>`;
        } else {
          d.innerHTML=display;
        }
      } else {
        d.innerHTML=display;
      }
      g.appendChild(d);
    });
  });
}

function renderWeek(n){
  const w=W.find(x=>x.uke===n);if(!w)return;

  document.getElementById('winfo').innerHTML=`
    <div class="ii"><div class="il">Uke</div><div class="iv ac">Uke ${n} (${w.kaluke})</div></div>
    <div class="ii"><div class="il">Dato</div><div class="iv">${w.dato}</div></div>
    <div class="ii"><div class="il">Fase</div><div class="iv">${w.fase}</div></div>
    ${race?`<div class="ii"><div class="il">Løp</div><div class="iv" style="color:var(--or)">🏁 ${race.navn} ${race.km} km</div></div>`:''}
  `;
  const days=[{k:'man',l:'Mandag'},{k:'tir',l:'Tirsdag'},{k:'ons',l:'Onsdag'},{k:'tor',l:'Torsdag'},{k:'fre',l:'Fredag'},{k:'lor',l:'Lørdag'},{k:'son',l:'Søndag'}];
  const det=document.getElementById('wdet');det.innerHTML='';
  days.forEach(d=>{
    // Build txt - use SA/SB for strength days with updated exercises
    let txt=w[d.k]||'';
    if(d.k==='tor'&&SA[String(n)]&&SA[String(n)].length&&(txt.startsWith('Styrke A')||txt==='Hvile'||txt==='')){
      const lines=txt.split('\n');
      const nonStr=lines.filter(l=>!l.startsWith('Styrke A')&&!SA[String(n)].some(e=>l.startsWith(e.split(' – ')[0])));
      txt=nonStr.join('\n').trim()+(nonStr.length&&nonStr.join('').trim()?'\n':'')+'Styrke A\n'+SA[String(n)].join('\n');
    }
    if(d.k==='lor'&&SA[String(n)]&&SA[String(n)].length&&txt.startsWith('Styrke A')){
      txt='Styrke A\n'+SA[String(n)].join('\n');
    }
    if(d.k==='tir'&&SB[String(n)]&&SB[String(n)].length){
      const lines=txt.split('\n');
      const nonStr=lines.filter(l=>!l.startsWith('Styrke B')&&!SB[String(n)].some(e=>l.startsWith(e.split(' – ')[0])));
      // Insert IV drag after "planlagte intervaller" line
      const iv=IV.find(x=>x.uke===n);
      const nonStrWithIv=nonStr.map(l=>l.includes('planlagte intervaller')&&iv?l+'\n'+iv.drag+' ('+iv.arbeidstid+' min arbeid)':l);
      txt=nonStrWithIv.join('\n').trim()+(nonStr.length&&nonStr.join('').trim()?'\n':'')+'\nStyrke B\n'+SB[String(n)].join('\n');
    }
    const isH=txt==='Hvile';const isR=txt.includes('🏁');
    let badge='',bcls='';
    if(isH){badge='Hvile';}else if(isR){badge='Løp';bcls='lop';}
    else if(txt.startsWith('Intervall')){badge='Intervall + Styrke B';bcls='int';}
    else if(txt.startsWith('Tempoøkt')){badge='Tempo';bcls='tmp';}
    else if(txt.startsWith('Rolig løpetur + SL')){badge='Rolig løp + ST';bcls='rol';}
    else if(txt.startsWith('Rolig langtur')){badge='Langtur';bcls='rol';}
    else if(txt.startsWith('Styrke A')){badge='Styrke A';bcls='str';}
    else{badge=txt.split('\n')[0];}
    const card=document.createElement('div');
    card.className='dcard'+(isH?' hvile-c':'')+(isR?' race-d':'');
    const lines=txt.split('\n');
    const fmt=isH?'<span style="color:var(--m);font-style:italic">Hvile / aktiv restitusjon</span>':
      lines.map((l,i)=>{
        if(i===0)return`<strong style="color:var(--a)">${l}</strong>`;
        if(l.trim()==='')return'';
        if(l==='Styrke B'||l.startsWith('Styrke A'))return`<strong style="color:var(--pu);display:block;margin-top:8px">${l}</strong>`;
        return l;
      }).join('\n');
    card.innerHTML=`<div class="dhdr"><span class="dn">${d.l}</span><span class="dbadge ${bcls}">${badge}</span></div><div class="dcont">${fmt}</div>`;
    det.appendChild(card);
  });
}

function normalizeTime(v){
  if(!v) return v;
  const p=v.trim().split(':');
  if(p.length===2) return '0:'+p[0].padStart(2,'0')+':'+p[1].padStart(2,'0');
  if(p.length===3) return p[0]+':'+p[1].padStart(2,'0')+':'+p[2].padStart(2,'0');
  return v;
}
function upL(k,f,v){
  if(!loggL[k])loggL[k]={};
  if(f==='var'||f==='tid') v=normalizeTime(v);
  loggL[k][f]=v;
}
function upLDrag(k,dragNum,field,val){
  if(!loggL[k]) loggL[k]={};
  if(!loggL[k].drags) loggL[k].drags={};
  if(!loggL[k].drags[dragNum]) loggL[k].drags[dragNum]={};
  loggL[k].drags[dragNum][field]=val;
  // Update snitt display
  const baseId=k.replace(/_/g,'-');
  const drags=loggL[k].drags;
  const num=Object.keys(drags).length;
  const tEl=document.getElementById('snitt-tempo-'+baseId);
  const pEl=document.getElementById('snitt-puls-'+baseId);
  if(tEl) tEl.querySelector('span').textContent=calcSnittTempo(drags,num);
  if(pEl) pEl.querySelector('span').textContent=calcSnittPuls(drags,num);
}

function calcSnittTempo(drags, num){
  // Convert mm:ss to seconds, average, convert back
  const vals=[];
  for(let i=1;i<=num;i++){
    const d=drags[i]||{};
    if(d.tempo){
      const parts=d.tempo.split(':');
      if(parts.length===2) vals.push(parseInt(parts[0])*60+parseInt(parts[1]));
    }
  }
  if(!vals.length) return '–';
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  return Math.floor(avg/60)+':'+(avg%60).toString().padStart(2,'0');
}

function calcSnittPuls(drags, num){
  const vals=[];
  for(let i=1;i<=num;i++){
    const d=drags[i]||{};
    if(d.puls) vals.push(parseFloat(d.puls));
  }
  if(!vals.length) return '–';
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)+' bpm';
}

function calcMaksPuls(drags, num){
  const vals=[];
  for(let i=1;i<=num;i++){
    const d=drags[i]||{};
    if(d.mx) vals.push(parseFloat(d.mx));
  }
  if(!vals.length) return '–';
  return Math.max(...vals)+' bpm';
}

function upS(k,f,v){if(!loggS[k])loggS[k]={};loggS[k][f]=v;}

function renderStats(){
  const sb=document.getElementById('stats-body');
  if(!sb){console.error('stats-body not found');return;}
  sb.innerHTML='';

  const loktKeys=['intervall','roligLop','tempo','langtur','race'];
  let totalKm=0,totalUtfort=0,totalIkke=0,totalSecs=0;
  const roligPulsList=[],intervallPulsList=[],folList=[],roligTempoList=[];

  W.forEach(w=>{
    loktKeys.forEach(k=>{
      const sv=loggL[w.uke+'_'+k]||{};
      if(sv.ikkeUtfort){ totalIkke++; return; }
      if((sv['var']||sv.tid||sv.sn||sv.km)) totalUtfort++;
      // Sum total time
      const timeStr=sv['var']||sv.tid||'';
      if(timeStr){
        const p=timeStr.split(':');
        if(p.length===3) totalSecs+=parseInt(p[0]||0)*3600+parseInt(p[1]||0)*60+parseInt(p[2]||0);
        else if(p.length===2) totalSecs+=parseInt(p[0]||0)*60+parseInt(p[1]||0);
      }
      if(sv.km) totalKm+=parseFloat(sv.km)||0;
      // Snitt puls fra rolig løpetur og langtur
      if((k==='roligLop'||k==='langtur')&&sv.sn) roligPulsList.push(parseFloat(sv.sn));
      if(sv.fol) folList.push(parseFloat(sv.fol));
      // Intervall puls fra drag-tabellen
      if(k==='intervall'&&sv.drags){
        Object.values(sv.drags).forEach(d=>{if(d.puls) intervallPulsList.push(parseFloat(d.puls));});
      }
      // Snitt tempo fra rolig løpetur og langtur (format mm:ss)
      if((k==='roligLop'||k==='langtur')&&sv.tempo){
        const parts=sv.tempo.split(':');
        if(parts.length===2){
          const secs=parseInt(parts[0])*60+parseInt(parts[1]);
          if(!isNaN(secs)) roligTempoList.push({uke:w.uke,secs});
        }
      }
    });
    // Count strength sessions
    ['A','B'].forEach(okt=>{
      const src=okt==='A'?SA:SB;
      const ovs=src[String(w.uke)]||[];
      if(!ovs.length) return;
      // Use first exercise name to build correct key
      const firstOv=ovs[0]||'';
      const firstName=firstOv.split(' – ')[0].replace(/[^a-zA-Z0-9]/g,'-');
      const sk=w.uke+'_'+okt+'_'+firstName+'_s1';
      const sv=loggS[sk]||{};
      if(sv.vekt||sv.reps) totalUtfort++;
    });
  });
  totalKm=Math.round(totalKm*10)/10;
  const totalH=Math.floor(totalSecs/3600);
  const totalM=Math.floor((totalSecs%3600)/60).toString().padStart(2,'0');
  const totalTimeStr=totalSecs>0?totalH+':'+totalM:'–';

  const snittRoligPuls=roligPulsList.length?Math.round(roligPulsList.reduce((a,b)=>a+b,0)/roligPulsList.length):null;
  // Snitt tempo rolig (sekunder → mm:ss)
  const snittTempoSecs=roligTempoList.length?Math.round(roligTempoList.reduce((a,b)=>a+b.secs,0)/roligTempoList.length):null;
  const snittTempoStr=snittTempoSecs?Math.floor(snittTempoSecs/60)+':'+(snittTempoSecs%60).toString().padStart(2,'0')+' min/km':null;
  const snittIntervallPuls=intervallPulsList.length?Math.round(intervallPulsList.reduce((a,b)=>a+b,0)/intervallPulsList.length):null;

  const snittFol=folList.length?Math.round(folList.reduce((a,b)=>a+b,0)/folList.length*10)/10:null;

  // Puls per uke (for triple chart)
  const pulsData=[];
  const folData2=[];
  W.forEach(w=>{
    let list=[];
    ['roligLop','langtur'].forEach(k=>{const sv=loggL[w.uke+'_'+k]||{};if(sv.sn)list.push(parseFloat(sv.sn));});
    if(list.length) pulsData.push({uke:w.uke,puls:Math.round(list.reduce((a,b)=>a+b,0)/list.length)});
    const folList2=['roligLop','langtur','tempo','intervall'].map(k=>loggL[w.uke+'_'+k]||{}).filter(sv=>sv.fol).map(sv=>parseFloat(sv.fol));
    if(folList2.length) folData2.push({uke:w.uke,fol:Math.round(folList2.reduce((a,b)=>a+b,0)/folList2.length*10)/10});
  });

  // ── Søvn-data ────────────────────────────────────────────────────────────
  const sovnByUke={};
  let sovnAllMins=[];
  W.forEach(w=>{
    const sv=loggL[w.uke+'_sovn']||{};
    const dayMins=['man','tir','ons','tor','fre','lor','son'].map(d=>{
      const v=sv['var_'+d]||'';
      if(!v) return null;
      const parts=v.split(':');
      if(parts.length>=2){const h=parseInt(parts[0])||0;const m=parseInt(parts[1])||0;return h*60+m;}
      return null;
    }).filter(x=>x!==null);
    if(dayMins.length){
      const avg=Math.round(dayMins.reduce((a,b)=>a+b,0)/dayMins.length);
      sovnByUke[w.uke]={avg,count:dayMins.length};
      dayMins.forEach(m=>sovnAllMins.push(m));
    }
  });
  const totalSovnMin=sovnAllMins.length?Math.round(sovnAllMins.reduce((a,b)=>a+b,0)/sovnAllMins.length):null;
  const snittSovn=totalSovnMin?(Math.floor(totalSovnMin/60)+'t '+(totalSovnMin%60).toString().padStart(2,'0')+'m'):null;
  const sovnNetter=sovnAllMins.length||null;

  // Hvilepuls data
  const hvilepulsByUke={};let hvilepulsAll=[];
  W.forEach(w=>{
    const sv=loggL[w.uke+'_sovn']||{};
    const pulsList=['man','tir','ons','tor','fre','lor','son'].map(d=>{
      const v=sv['puls_'+d];return v?parseFloat(v):null;
    }).filter(x=>x!==null);
    if(pulsList.length){
      const avg=Math.round(pulsList.reduce((a,b)=>a+b,0)/pulsList.length);
      hvilepulsByUke[w.uke]=avg;
      pulsList.forEach(p=>hvilepulsAll.push(p));
    }
  });
  const snittHvilepuls=hvilepulsAll.length?Math.round(hvilepulsAll.reduce((a,b)=>a+b,0)/hvilepulsAll.length):null;
  const minHvilepuls=hvilepulsAll.length?Math.min(...hvilepulsAll):null;

  // Korrelasjon søvn vs følelse
  const sovnFolKorr=[];
  W.forEach(w=>{
    if(!sovnByUke[w.uke]) return;
    const folUke=[];
    ['roligLop','langtur','intervall','tempo'].forEach(k=>{
      const sv=loggL[w.uke+'_'+k]||{};
      if(sv.fol) folUke.push(parseFloat(sv.fol));
    });
    if(folUke.length){
      const snittFolUke=Math.round(folUke.reduce((a,b)=>a+b,0)/folUke.length*10)/10;
      sovnFolKorr.push({uke:w.uke,sovn:sovnByUke[w.uke].avg/60,fol:snittFolUke});
    }
  });

  // Streak: consecutive weeks with at least one logged session
  let streak=0, streakActive=true;
  const loggedWeekNums=W.map(w=>{
    const loktK=['intervall','roligLop','tempo','langtur','race'];
    return loktK.some(k=>{const sv=loggL[w.uke+'_'+k]||{};return sv['var']||sv.tid||sv.sn||sv.km;});
  });
  for(let i=loggedWeekNums.length-1;i>=0;i--){
    if(loggedWeekNums[i]&&streakActive) streak++;
    else if(!loggedWeekNums[i]&&streak>0){streakActive=false;break;}
  }

  // Days to race
  const raceDate=new Date('2026-10-17');
  const daysLeft=Math.max(0,Math.ceil((raceDate-new Date())/86400000));
  const weeksLeft=Math.ceil(daysLeft/7);

  // Goal: 55 min on 10 km = 5:30/km
  // Best race tempo so far
  const raceTimes=['1','7','8','19','20','24'].map(u=>{
    const sv=loggL[u+'_race']||{};
    return sv.tempo||null;
  }).filter(Boolean);

  // Summary cards
  const cards=[
    {l:'Totalt løpt',v:totalKm+' km',c:'var(--a)'},
    {l:'Total treningstid',v:totalTimeStr,c:'var(--a2)'},
    {l:'Gjennomført',v:totalUtfort+' økter',c:'var(--a2)'},
    {l:'Snitt puls (rolig)',v:snittRoligPuls?snittRoligPuls+' bpm':'–',c:'var(--or)'},
    {l:'Snitt tempo (rolig)',v:snittTempoStr||'–',c:'var(--a2)'},
    {l:'Snitt puls (intervall)',v:snittIntervallPuls?snittIntervallPuls+' bpm':'–',c:'#e05b00'},
    {l:'Snitt følelse',v:snittFol?snittFol+' / 5':'–',c:'var(--pu)'},
    {l:'Snitt søvn',v:snittSovn?snittSovn:'–',c:'#2a7abf'},
    {l:'Snitt hvilepuls',v:snittHvilepuls?snittHvilepuls+' bpm':'–',c:'#2a7abf'},
    {l:'Lavest hvilepuls',v:minHvilepuls?minHvilepuls+' bpm':'–',c:'#2a7abf'},
    {l:'Netter registrert',v:sovnNetter?sovnNetter+' netter':'–',c:'#2a7abf'},
  ];
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px';
  cards.forEach(c=>{
    const d=document.createElement('div');
    d.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px';
    d.innerHTML='<div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">'+c.l+'</div><div style="font-size:22px;font-weight:500;color:'+c.c+'">'+c.v+'</div>';
    grid.appendChild(d);

function renderStyrke(){
  const sb=document.getElementById('styrke-body');
  sb.innerHTML='';
  const uker=Array.from({length:24},(_,i)=>i+1);

  function buildTable(title, color, lightColor, exercises, data){
    const wrap=document.createElement('div');
    wrap.style.cssText='margin-bottom:32px;overflow-x:auto';
    const h=document.createElement('h2');
    h.style.cssText='font-family:"Fraunces",serif;font-size:18px;font-weight:900;color:'+color+';margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)';
    h.textContent=title;
    wrap.appendChild(h);

    const tbl=document.createElement('table');
    tbl.style.cssText='border-collapse:collapse;min-width:600px;width:100%;font-size:11px';

    // Header row
    const thead=document.createElement('thead');
    let hRow='<tr><th style="text-align:left;padding:6px 10px;background:'+color+';color:#fff;position:sticky;left:0;z-index:2;white-space:nowrap">Øvelse</th>';
    uker.forEach(u=>{
      hRow+='<th style="padding:6px 6px;background:'+lightColor+';color:var(--t);text-align:center;white-space:nowrap">U'+u+'</th>';
    });
    hRow+='</tr>';
    thead.innerHTML=hRow;
    tbl.appendChild(thead);

    const tbody=document.createElement('tbody');
    exercises.forEach(([label, name],rowIdx)=>{
      const tr=document.createElement('tr');
      tr.style.background=rowIdx%2===0?'var(--s2)':'var(--s)';
      let row='<td style="padding:6px 10px;font-weight:500;white-space:nowrap;position:sticky;left:0;background:'+(rowIdx%2===0?'var(--s2)':'var(--s)')+';z-index:1"><span style="color:var(--m);font-size:10px">'+label+'</span> '+name+'</td>';
      uker.forEach(u=>{
        const ovs=data[String(u)]||[];
        let plan='';
        for(const o of ovs){
          if(o.split(' – ')[0]===name){plan=o.split(' – ').slice(1).join(' – ');break;}
        }
        row+='<td style="padding:6px 6px;text-align:center;white-space:nowrap">'+plan+'</td>';
      });
      tr.innerHTML=row;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
    sb.appendChild(wrap);
  }

  buildTable('Styrke A – Lørdag','var(--a)','var(--s2)',[
    ['A1','Smith squat'],['A2','Dead bug'],
    ['B1','Romanian deadlift (RDL)'],['B2','Pallof press'],
    ['C1','Bulgarian split squat'],['C2','Single-leg RDL'],
    ['D1','Leg extension'],['D2','Single-leg calf raise']
  ],SA);

  buildTable('Styrke B – Tirsdag','var(--pu)','var(--s2)',[
    ['A1','Lat Pulldown'],['A2','Single arm-shoulder press'],
    ['B1','Seated row'],['B2','Plank'],
    ['C1','Calf raise'],['C2','Superman']
  ],SB);
}

function initReg(){
  const sel=document.getElementById('reg-uke');
  W.forEach(w=>{const o=document.createElement('option');o.value=w.uke;o.textContent=`Uke ${w.uke} (${w.kaluke}) – ${w.dato} – ${w.fase}`;sel.appendChild(o);});

  // Auto-detect current week based on today's date
  const today=new Date();
  const start=new Date('2026-05-04');
  const diffDays=Math.floor((today-start)/(1000*60*60*24));
  const curUke=Math.min(24,Math.max(1,Math.floor(diffDays/7)+1));
  sel.value=curUke;
  // Sync ukesoversikt to same week
  const wsel=document.getElementById('wsel');
  if(wsel){wsel.value=curUke;curW=curUke;renderWeek(curUke);}
  renderReg();
}

function buildSøvnBody(uke, sovnSv) {
  const body = document.createElement('div');
  body.style.cssText = 'padding:12px 14px';
  const days = [
    {k:'man', l:'Mandag'},{k:'tir', l:'Tirsdag'},{k:'ons', l:'Onsdag'},
    {k:'tor', l:'Torsdag'},{k:'fre', l:'Fredag'},{k:'lor', l:'Lørdag'},
    {k:'son', l:'Søndag'}
  ];
  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px';
  
  days.forEach(({k, l}) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px';
    const lbl = document.createElement('label');
    lbl.style.cssText = 'font-size:11px;color:var(--m);font-weight:500';
    lbl.textContent = l;
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = 'tt:mm';
    inp.value = sovnSv['var_'+k] || '';
    inp.style.cssText = 'padding:6px 8px;border:1px solid var(--b);border-radius:4px;font-size:12px;font-family:var(--mono,monospace);background:var(--s2);color:var(--t);width:100%;box-sizing:border-box';
    inp.oninput = () => {
      if(!loggL[`${uke}_sovn`]) loggL[`${uke}_sovn`] = {};
      loggL[`${uke}_sovn`]['var_'+k] = inp.value;
    };
    const puls = document.createElement('input');
    puls.type = 'number';
    puls.placeholder = 'Hvilepuls';
    puls.value = sovnSv['puls_'+k] || '';
    puls.min = 30; puls.max = 100;
    puls.style.cssText = 'padding:6px 8px;border:1px solid var(--b);border-radius:4px;font-size:12px;background:var(--s2);color:var(--t);width:100%;box-sizing:border-box;margin-top:3px';
    puls.oninput = () => {
      if(!loggL[`${uke}_sovn`]) loggL[`${uke}_sovn`] = {};
      loggL[`${uke}_sovn`]['puls_'+k] = puls.value;
    };
    const kom = document.createElement('input');
    kom.type = 'text';
    kom.placeholder = 'Kommentar';
    kom.value = sovnSv['kom_'+k] || '';
    kom.style.cssText = 'padding:6px 8px;border:1px solid var(--b);border-radius:4px;font-size:11px;background:var(--s2);color:var(--t);width:100%;box-sizing:border-box;margin-top:3px';
    kom.oninput = () => {
      if(!loggL[`${uke}_sovn`]) loggL[`${uke}_sovn`] = {};
      loggL[`${uke}_sovn`]['kom_'+k] = kom.value;
    };
    wrap.appendChild(lbl);
    wrap.appendChild(inp);
    wrap.appendChild(puls);
    wrap.appendChild(kom);
    grid.appendChild(wrap);
  });
  
  body.appendChild(grid);
  
  const saveBtn = document.createElement('button');
  saveBtn.className = 'sbtn';
  saveBtn.style.cssText = 'background:var(--a);color:#fff;border:none;padding:8px 18px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--mono,monospace)';
  saveBtn.textContent = 'LAGRE SØVN';
  saveBtn.onclick = () => {
    if(!loggL[`${uke}_sovn`]) loggL[`${uke}_sovn`] = {};
    localStorage.setItem('hpm_l', JSON.stringify(loggL));
    fbSave();
    const daysLogged = ['man','tir','ons','tor','fre','lor','son']
      .filter(d => loggL[`${uke}_sovn`]['var_'+d]).length;
    hpmCollapse(`hpm_${uke}_sovn`, `${daysLogged} dager registrert`);
    setTimeout(() => renderStats(), 1400);
  };
  body.appendChild(saveBtn);
  return body;
}


function renderProgresjon(){
  const pb = document.getElementById('prog-body');
  pb.innerHTML = '';

  const faser = ["Nedtrapping", "Basis", "Basis", "Basis", "Basis", "Basis", "Nedtrapping", "Nedtrapping", "Oppbygging", "Oppbygging", "Oppbygging", "Deload", "Toppform", "Toppform", "Toppform", "Deload", "Toppform", "Nedtrapping", "Nedtrapping", "Gjenoppbygging", "Gjenoppbygging", "Gjenoppbygging", "Nedtrapping", "Nedtrapping"];
  const roligLop = Array.from({length:24}, (_,i) => {
    const w=W[i]; for(const d of ['man','tir','ons','tor','fre','lor','son']){const v=w[d]||'';if(v.includes('Rolig løpetur')){const m=v.match(/(\d+) min/);return m?parseInt(m[1]):null;}}return null;
  });
  const tempo = Array.from({length:24}, (_,i) => {
    const w=W[i]; for(const d of ['man','tir','ons','tor','fre','lor','son']){const v=w[d]||'';if(v.includes('Tempoøkt')){const m=v.match(/(\d+) min tempo/);return m?parseInt(m[1]):null;}}return null;
  });
  const langtur = Array.from({length:24}, (_,i) => {
    const w=W[i]; for(const d of ['man','tir','ons','tor','fre','lor','son']){const v=w[d]||'';if(v.includes('Rolig langtur')){const m=v.match(/(\d+) min/);return m?parseInt(m[1]):null;}}return null;
  });
  const intervall = Array.from({length:24}, (_,i) => { const iv=IV.find(x=>x.uke===i+1); return iv?iv.arbeidstid:null; });

  function fc(f){
    if(f==='Basis') return 'rgba(192,48,106,0.06)';

async function fbSave(){
  setSyncStatus('● Lagrer...','var(--or)');
  try{
    const body={fields:{
      l:{stringValue:JSON.stringify(loggL)},
      s:{stringValue:JSON.stringify(loggS)},
      ts:{integerValue:Date.now()}
    }};
    const res=await fetch(FB_URL+'?key='+FB_KEY,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},

    });

// Load from Firebase on startup
async function fbLoad(){
  setSyncStatus('● Henter data...','var(--m)');
  try{
    const res=await fetch(FB_URL+'?key='+FB_KEY);
    if(res.status===404){setSyncStatus('● Klar – ingen data ennå','var(--a2)');return;}
    if(!res.ok) throw new Error('HTTP '+res.status);
    const d=await res.json();
    const fields=d.fields||{};
    if(fields.l) loggL=JSON.parse(fields.l.stringValue);
    if(fields.s) loggS=JSON.parse(fields.s.stringValue);

    setSyncStatus('● Lastet fra sky','var(--a2)');
  }catch(e){

  }
}

function fbListen(){
  setInterval(async()=>{
    // Don't overwrite while user is typing
    if(userTyping) return;
    try{
      const res=await fetch(FB_URL+'?key='+FB_KEY);
      if(!res.ok) return;
      const d=await res.json();
      const fields=d.fields||{};
      if(fields.l){
        const remoteL=JSON.parse(fields.l.stringValue);
        const remoteS=fields.s?JSON.parse(fields.s.stringValue):{};
        // Only update if remote timestamp is newer
        const remoteTs=fields.ts?parseInt(fields.ts.integerValue):0;
        const localTs=parseInt(localStorage.getItem('hpm_ts')||'0');
        if(remoteTs<=localTs) return;
        loggL=remoteL; loggS=remoteS;
        localStorage.setItem('hpm_l',JSON.stringify(loggL));
        localStorage.setItem('hpm_s',JSON.stringify(loggS));
        localStorage.setItem('hpm_ts',String(remoteTs));
        document.getElementById('ugrid').innerHTML='';
        renderUkesplan(); renderStats();
        const rv=document.getElementById('v-reg');
        if(rv&&rv.classList.contains('active')) renderReg();
        setSyncStatus('● Synkronisert','var(--a2)');
      }
    }catch(e){ console.warn('Poll error:',e); }
  },15000);

// ── Prognose ─────────────────────────────────────────────────────────────
function renderPrognose(){
  const sb=document.getElementById('prognose-body');
  sb.innerHTML='';

  // ── Helper: parse "h:mm:ss" or "m:ss" → total seconds
  function tidTilSek(s){
    if(!s) return null;
    const p=s.trim().split(':').map(Number);
    if(p.length===3) return p[0]*3600+p[1]*60+p[2];
    if(p.length===2) return p[0]*60+p[1];
    return null;
  }

  // ── Helper: seconds → "h:mm:ss" or "mm:ss"
  function sekTilTid(s){
    s=Math.round(s);
    const h=Math.floor(s/3600);
    const m=Math.floor((s%3600)/60);
    const sc=s%60;
    if(h>0) return h+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');
    return m+':'+String(sc).padStart(2,'0');
  }

  // ── Helper: seconds/km → "m:ss min/km"
  function sekPerKmTilTempo(spk){
    const m=Math.floor(spk/60);
    const s=Math.round(spk%60);
    return m+':'+String(s).padStart(2,'0')+' min/km';
  }

  // ── Riegel formula: T2 = T1 * (D2/D1)^1.06
  function riegel(t1, d1, d2){ return t1 * Math.pow(d2/d1, 1.06); }

  // ── All races with logged data
  const racesList=[
    {uke:1,navn:'Backyard Ultra',km:18,dato:'09.05.2026'},
    {uke:7,navn:'Sommernattsløpet',km:5,dato:'20.06.2026'},
    {uke:8,navn:'EcoTrail Bergen',km:12,dato:'27.06.2026'},
    {uke:19,navn:'Jentemila',km:5,dato:'05.09.2026'},
    {uke:20,navn:'Oslo Maraton',km:10,dato:'12.09.2026'},
    {uke:24,navn:'Hytteplanmila',km:10,dato:'17.10.2026'},
  ];

  // ── Collect all usable reference points (race + tempo + langtur)
  let refs=[];

  // From pre-plan historical races
  PRE_RACE.forEach(r=>{
    const sek=tidTilSek(r.tid);
    if(sek&&r.km) refs.push({kilde:r.navn+' ('+r.dato+')', km:r.km, sek, type:'løp', pre:true});
  });

  // From races
  racesList.forEach(r=>{
    const sv=loggL[r.uke+'_race']||{};
    const sek=tidTilSek(sv.tid);
    const dist=parseFloat(sv.km)||r.km;
    if(sek&&dist) refs.push({kilde:r.navn+' ('+r.dato+')',km:dist,sek,type:'løp'});
  });



  // ── Target distances
  const targets=[
    {label:'5 km',dist:5,emoji:'🏃'},
    {label:'10 km',dist:10,emoji:'🏃'},
    {label:'Halvmaraton (21,1 km)',dist:21.0975,emoji:'🏅'},
    {label:'Maraton (42,2 km)',dist:42.195,emoji:'🏆'},
  ];

  // ── Goal for Hytteplanmila
  const GOAL_DIST=10;
  const GOAL_SEK=55*60; // 55:00

  // ── Header
  const hdr=document.createElement('div');
  hdr.style.cssText='margin-bottom:28px';
  hdr.innerHTML='<h2 style="font-family:\'Fraunces\',serif;font-size:22px;font-weight:900;color:var(--a);margin-bottom:6px">Løpsprognose</h2>';
  sb.appendChild(hdr);

  // ── Historiske løp (før plan)
  const preTitle=document.createElement('h3');
  preTitle.style.cssText='font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:10px;font-weight:500';
  preTitle.textContent='Historiske løp (grunnlag)';
  sb.appendChild(preTitle);

  const preWrap=document.createElement('div');
  preWrap.style.cssText='display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px';
  PRE_RACE.forEach(r=>{
    const c=document.createElement('div');
    c.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:12px 15px;font-size:11px;min-width:200px';
    c.innerHTML='<div style="font-size:10px;color:var(--m);margin-bottom:3px">'+r.dato+'</div>'
      +'<div style="font-weight:500;color:var(--t);margin-bottom:8px">'+r.navn+'</div>'
      +'<div style="display:flex;gap:14px;flex-wrap:wrap">'
      +'<div><div style="font-size:9px;color:var(--m)">TID</div><div style="font-weight:500;color:var(--or)">'+r.tid+'</div></div>'
      +'<div><div style="font-size:9px;color:var(--m)">TEMPO</div><div style="font-weight:500;color:var(--a2)">'+r.tempo+' /km</div></div>'
      +'<div><div style="font-size:9px;color:var(--m)">SNITTPULS</div><div style="font-weight:500">'+r.sn+' bpm</div></div>'
      +'<div><div style="font-size:9px;color:var(--m)">MAKSPULS</div><div style="font-weight:500">'+r.mx+' bpm</div></div>'
      +'</div>';
    preWrap.appendChild(c);
  });
  sb.appendChild(preWrap);

  if(refs.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='background:var(--s);border:1px solid var(--b);border-radius:8px;padding:28px 20px;color:var(--m);font-size:12px;text-align:center';
    empty.innerHTML='<div style="font-size:24px;margin-bottom:10px">📋</div>'
      +'<div style="font-weight:500;color:var(--t);margin-bottom:6px">Ingen data å beregne fra ennå</div>'
      +'<div>Registrer løpsresultater (tid + distanse) under <strong>Registrering</strong> for å se prognoser her.</div>';
    sb.appendChild(empty);
    return;
  }

  // ── Best estimate per target: use the reference point giving lowest time
  // (most recent race is also shown separately)

  // For each reference, compute all target estimates
  const allEstimates=refs.map(ref=>{
    const ests=targets.map(t=>{
      const sek=riegel(ref.sek, ref.km, t.dist);
      return {dist:t.dist,label:t.label,emoji:t.emoji,sek};
    });
    return {ref, ests};
  });

  // ── Prognose-kort: én rad per target, beste estimat + goal-indikator
  const progTitle=document.createElement('h3');
  progTitle.style.cssText='font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:14px;font-weight:500';
  progTitle.textContent='Beste estimat per distanse';
  sb.appendChild(progTitle);

  const progGrid=document.createElement('div');
  progGrid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:32px';

  targets.forEach(t=>{
    // Find best (fastest) estimate across all refs
    let best=null;
    allEstimates.forEach(ae=>{
      const e=ae.ests.find(x=>x.dist===t.dist);
      if(e&&(!best||e.sek<best.sek)) best={sek:e.sek,ref:ae.ref};
    });

    const card=document.createElement('div');
    const isGoalDist=(t.dist===GOAL_DIST);
    const goalDiff=isGoalDist&&best? best.sek-GOAL_SEK : null;
    const aheadOfGoal=goalDiff!==null&&goalDiff<=0;
    const borderColor=isGoalDist?'var(--a)':'var(--b)';

    card.style.cssText='background:var(--s);border:2px solid '+borderColor+';border-radius:10px;padding:18px 16px;position:relative;overflow:hidden';

    let goalBadge='';
    if(isGoalDist&&best){
      const diffStr=Math.abs(Math.round(goalDiff));
      const diffMin=Math.floor(diffStr/60);
      const diffSek=diffStr%60;
      const diffLabel=diffMin>0?diffMin+':'+String(diffSek).padStart(2,'0'):diffSek+' sek';
      goalBadge='<div style="margin-top:10px;padding:6px 10px;border-radius:6px;font-size:10px;background:'
        +(aheadOfGoal?'rgba(0,140,0,.12)':'rgba(192,48,106,.1)')
        +';color:'+(aheadOfGoal?'#2a7a2a':'var(--a)')
        +';font-weight:500">★ Mål 55:00 — '
        +(aheadOfGoal?diffLabel+' foran plan':'Mangler '+diffLabel+' på planen')
        +'</div>';
    }

    card.innerHTML=
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
      +'<span style="font-size:22px">'+t.emoji+'</span>'
      +'<div><div style="font-size:14px;font-weight:500;color:var(--t)">'+t.label+'</div>'
      +(isGoalDist?'<div style="font-size:10px;color:var(--a)">Hytteplanmila ★</div>':'')
      +'</div></div>'
      +(best?
        '<div style="font-size:28px;font-family:\'Fraunces\',serif;font-weight:900;color:var(--a);line-height:1">'+sekTilTid(best.sek)+'</div>'
        +'<div style="font-size:10px;color:var(--m);margin-top:4px">'+sekPerKmTilTempo(best.sek/t.dist)+'</div>'
        +'<div style="font-size:10px;color:var(--m);margin-top:6px;border-top:1px solid var(--b);padding-top:6px">Grunnlag: '+best.ref.kilde+'</div>'
        +goalBadge
        :'<div style="color:var(--m);font-size:12px;font-style:italic">Ingen data</div>');
    progGrid.appendChild(card);
  });
  sb.appendChild(progGrid);

  // ── Detaljert tabell: alle referanser × alle distanser
  const tblTitle=document.createElement('h3');
  tblTitle.style.cssText='font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:14px;font-weight:500';
  tblTitle.textContent='Alle estimater per referanseøkt';
  sb.appendChild(tblTitle);

  const tblWrap=document.createElement('div');
  tblWrap.style.cssText='overflow-x:auto;margin-bottom:28px';

  const tbl=document.createElement('table');
  tbl.className='ltbl';
  tbl.style.minWidth='600px';

  const thead=document.createElement('thead');
  thead.innerHTML='<tr>'
    +'<th>Referanse</th>'
    +'<th>Distanse</th>'
    +'<th>Tid</th>'
    +'<th style="color:var(--a)">5 km</th>'
    +'<th style="color:var(--a)">10 km</th>'
    +'<th style="color:var(--a)">21,1 km</th>'
    +'<th style="color:var(--a)">42,2 km</th>'
    +'</tr>';
  tbl.appendChild(thead);

  const tbody=document.createElement('tbody');
  allEstimates.forEach(ae=>{
    const tr=document.createElement('tr');
    const preLabel=ae.ref.pre?'<span style="font-size:9px;background:var(--s2);border:1px solid var(--b);border-radius:3px;padding:1px 5px;color:var(--m);margin-left:5px;vertical-align:middle">før plan</span>':'';
    tr.innerHTML='<td style="color:var(--t);max-width:180px;white-space:normal">'+ae.ref.kilde+preLabel+'</td>'
      +'<td>'+ae.ref.km+' km</td>'
      +'<td style="font-weight:500">'+sekTilTid(ae.ref.sek)+'</td>'
      +ae.ests.map(e=>'<td style="font-family:\'Fraunces\',serif;font-weight:900;color:var(--a2)">'+sekTilTid(e.sek)+'<div style="font-size:9px;color:var(--m);font-family:\'DM Mono\',monospace;font-weight:400">'+sekPerKmTilTempo(e.sek/e.dist)+'</div></td>').join('');
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  tblWrap.appendChild(tbl);
  sb.appendChild(tblWrap);


}

  if (_auth.currentUser) {
    _auth.signOut();
  } else {
    _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(function(e) {
      alert('Innlogging feilet: ' + e.message);
    });
  }
}
